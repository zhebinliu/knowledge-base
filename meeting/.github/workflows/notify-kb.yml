name: Notify knowledge-base

# from-kb-system 分支更新后,通知主仓 zhebinliu/knowledge-base 自动重建 + 部署 meeting 模块。
# 通过 repository_dispatch 触发 knowledge-base 的 .github/workflows/deploy-meeting.yml,
# 由它拉最新 from-kb-system → build 三镜像推 ghcr → 部署 PROD + UAT。
#
# 前置:ai-meeting 仓需配置 secret KB_DISPATCH_TOKEN
#   —— 一个对 zhebinliu/knowledge-base 有 Contents: write 权限的 fine-grained PAT。
on:
  push:
    branches: [from-kb-system]

jobs:
  dispatch:
    name: Trigger knowledge-base deploy-meeting
    runs-on: ubuntu-latest
    steps:
      - name: repository_dispatch → knowledge-base
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.KB_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/zhebinliu/knowledge-base/dispatches \
            -d '{"event_type":"meeting-updated","client_payload":{"ref":"${{ github.ref_name }}","sha":"${{ github.sha }}"}}' \
            --fail-with-body
          echo "✅ 已通知 knowledge-base 部署 meeting(commit ${{ github.sha }})"
