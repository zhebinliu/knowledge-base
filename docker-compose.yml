services:
  # ── frontend-prod ────────────────────────────────────────────────────────
  # 持有 80/443 + 三域名 TLS;kb.liii.in/kb.tokenwave.cloud 服务自己 dist;
  # uat.tokenwave.cloud 反代到 frontend-uat。
  # 镜像名仍叫 frontend(向后兼容老 deploy 脚本)。
  frontend:
    image: ${FRONTEND_IMAGE:-kb-frontend-prod:latest}
    build:
      context: ./frontend
      args:
        ENV: prod
    ports:
      - "80:80"
      - "443:443"
    mem_limit: 256m
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      # 2026-05-12:维护标志 host 目录 → 容器 /var/run/kb-deploy/.maintenance
      - /opt/kb-system/run:/var/run/kb-deploy:ro
    depends_on:
      backend:
        condition: service_healthy
      # frontend-prod 反代 uat 域名,uat 容器要先起来(否则 nginx upstream fail)
      frontend-uat:
        condition: service_started
      # skillhub.tokenwave.cloud 也由 frontend-prod 反代
      skillhub-frontend:
        condition: service_started
      skillhub-backend:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── frontend-uat ─────────────────────────────────────────────────────────
  # 只对 docker 内网暴露 :80,由 frontend-prod 反代进来。无 SSL。
  # 每次推 main 自动重建/重启,影响仅限 uat.tokenwave.cloud。
  frontend-uat:
    image: ${FRONTEND_UAT_IMAGE:-kb-frontend-uat:latest}
    build:
      context: ./frontend
      args:
        ENV: uat
    mem_limit: 256m
    expose:
      - "80"
    volumes:
      - /opt/kb-system/run:/var/run/kb-deploy:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    image: ${BACKEND_IMAGE:-kb-backend:latest}
    build: ./backend
    ports:
      # 2026-05-12 修复:绑 127.0.0.1,nginx 同 docker network 仍可访问;
      # 避免公网直连绕过 nginx 限流 / TLS / 安全 header
      - "127.0.0.1:8000:8000"
    env_file: .env
    mem_limit: 512m
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - upload_data:/app/uploads
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1
    restart: unless-stopped
    dns_opt:
      - ndots:5      # 覆盖 GCP 的 ndots:0，让 Docker 内置 DNS 能正确解析容器名
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # 2026-05-12:backend startup 跑 create_all + 一堆 ALTER 可能 20-40s,start_period 内不算 unhealthy
      start_period: 60s

  celery_worker:
    image: ${BACKEND_IMAGE:-kb-backend:latest}
    build: ./backend
    env_file: .env
    mem_limit: 2g
    environment:
      PYTHONPATH: /app
    depends_on:
      - postgres
      - redis
    command: celery -A tasks worker --beat --loglevel=info --concurrency=2
    restart: unless-stopped
    dns_opt:
      - ndots:5
    healthcheck:
      test: ["CMD-SHELL", "celery -A tasks inspect ping -t 5 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    mem_limit: 512m
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: kb_system
      POSTGRES_USER: kb_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=256MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb_admin -d kb_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    mem_limit: 256m
    ports:
      - "127.0.0.1:6333:6333"
    environment:
      QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD_KB: 10000
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e 'GET /healthz HTTP/1.0\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200 OK'"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    mem_limit: 128m
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3

  minio:
    image: minio/minio:latest
    mem_limit: 256m
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── skillhub-backend ─────────────────────────────────────────────────────
  # 独立小站 skillhub.tokenwave.cloud,不复用主 backend / users。
  # 复用 postgres 实例(独立 DB=skillhub),复用主 frontend 容器的 443 端口反代。
  skillhub-backend:
    image: ${SKILLHUB_BACKEND_IMAGE:-kb-skillhub-backend:latest}
    build: ./skillhub/backend
    env_file: .env
    mem_limit: 384m
    environment:
      SKILLHUB_DB_HOST: postgres
      SKILLHUB_DB_PORT: "5432"
      SKILLHUB_DB_USER: kb_admin
      SKILLHUB_DB_PASSWORD: ${POSTGRES_PASSWORD}
      SKILLHUB_DB_NAME: skillhub
    expose:
      - "8001"
    volumes:
      - skillhub_data:/data/skillhub
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    dns_opt:
      - ndots:5
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ── skillhub-frontend ────────────────────────────────────────────────────
  skillhub-frontend:
    image: ${SKILLHUB_FRONTEND_IMAGE:-kb-skillhub-frontend:latest}
    build: ./skillhub/frontend
    mem_limit: 128m
    expose:
      - "80"
    depends_on:
      skillhub-backend:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  upload_data:
  skillhub_data:
