# 默认时区:北京时间。所有 service 通过 *tz_env 引入,容器内 date / 日志时间戳一致。
# Python `datetime.now()`、postgres `now()`、nginx access log 都按这个时区。
# 注:应用代码里的 `datetime.utcnow()` 不受 TZ 影响,仍返回 UTC(由后端代码控制)。
x-tz: &tz_env
  TZ: Asia/Shanghai

services:
  # ── edge ─────────────────────────────────────────────────────────────────
  # 全服务器唯一 80/443 入口(2026-07-14 从 frontend 拆出):持全部域名证书,
  # 按 server_name 反代到各内网容器(frontend / frontend-uat / skillhub / aihub /
  # kanban / studio)。业务部署只重建各自内网容器,edge 不动 → 互不影响。
  # 所有 upstream 用 resolver+变量延迟解析:不依赖任何业务容器先起,故无 depends_on。
  edge:
    image: ${EDGE_IMAGE:-kb-edge:latest}
    build:
      context: .
      dockerfile: edge/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    mem_limit: 128m
    environment:
      <<: *tz_env
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      # aihub.tokenwave.cloud/help 接入手册静态页(host 维护,改 md 后 pandoc 重渲染即可,不用 rebuild 镜像)
      - /opt/aihub-docs:/usr/share/nginx/aihub-help:ro
      # kanban.tokenwave.cloud 内部访问 Basic Auth 入口密码(host 维护,改密码不用 rebuild 镜像)
      # 生成:openssl passwd -apr1 → echo "team:<hash>" > /opt/kb-system/kanban.htpasswd
      - /opt/kb-system/kanban.htpasswd:/etc/nginx/kanban.htpasswd:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── frontend(kb 正式版)──────────────────────────────────────────────────
  # 只对 docker 内网暴露 :80,由 edge 反代进来(模式同 frontend-uat)。无 SSL。
  # 镜像名仍叫 frontend-prod(向后兼容 deploy 脚本)。
  frontend:
    image: ${FRONTEND_IMAGE:-kb-frontend-prod:latest}
    build:
      # 2026-05-19:context 改为仓库根,以便 COPY meeting/frontend/ submodule 内容
      context: .
      dockerfile: frontend/Dockerfile
      args:
        ENV: prod
    mem_limit: 256m
    environment:
      <<: *tz_env
    expose:
      - "80"
    volumes:
      # 2026-05-12:维护标志 host 目录 → 容器 /var/run/kb-deploy/.maintenance
      - /opt/kb-system/run:/var/run/kb-deploy:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── frontend-uat ─────────────────────────────────────────────────────────
  # 只对 docker 内网暴露 :80,由 frontend-prod 反代进来。无 SSL。
  # 每次推 main 自动重建/重启,影响仅限 uat.tokenwave.cloud。
  frontend-uat:
    image: ${FRONTEND_UAT_IMAGE:-kb-frontend-uat:latest}
    build:
      # 2026-05-19:context 改为仓库根,以便 COPY meeting/frontend/ submodule 内容
      context: .
      dockerfile: frontend/Dockerfile
      args:
        ENV: uat
    mem_limit: 256m
    environment:
      <<: *tz_env
    expose:
      - "80"
    volumes:
      - /opt/kb-system/run:/var/run/kb-deploy:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    image: ${BACKEND_IMAGE:-kb-backend:latest}
    build:
      # 2026-05-19:context 改为仓库根,以便 COPY meeting/backend/ submodule 内容
      context: .
      dockerfile: backend/Dockerfile
    ports:
      # 2026-05-12 修复:绑 127.0.0.1,nginx 同 docker network 仍可访问;
      # 避免公网直连绕过 nginx 限流 / TLS / 安全 header
      - "127.0.0.1:8000:8000"
    env_file: .env
    mem_limit: 512m
    environment:
      <<: *tz_env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - upload_data:/app/uploads
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1
    restart: unless-stopped
    dns_opt:
      - ndots:5      # 覆盖 GCP 的 ndots:0，让 Docker 内置 DNS 能正确解析容器名
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # 2026-05-12:backend startup 跑 create_all + 一堆 ALTER 可能 20-40s,start_period 内不算 unhealthy
      start_period: 60s

  celery_worker:
    image: ${BACKEND_IMAGE:-kb-backend:latest}
    build:
      # 2026-05-19:context 改为仓库根,以便 COPY meeting/backend/ submodule 内容
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    mem_limit: 2g
    environment:
      <<: *tz_env
      PYTHONPATH: /app
      # new-api(AI Hub) 数据库连接 — 每日报告用,不走应用 API 直连 DB
      # 密码由 .env 里 AIHUB_DB_PASSWORD 供;host 走 external network 里的容器名
      AIHUB_DB_HOST: new-api-postgres
      AIHUB_DB_PORT: "5432"
      AIHUB_DB_USER: newapi
      AIHUB_DB_NAME: newapi
    depends_on:
      - postgres
      - redis
    networks:
      # 默认 kb-system 网络仍连(kb-system_default,连 postgres/redis/qdrant/minio)
      - default
      # new-api 网络 external 引入,让 celery 能直连 new-api-postgres:5432
      - newapi_ext
    command: celery -A tasks worker --beat --loglevel=info --concurrency=2
    restart: unless-stopped
    dns_opt:
      - ndots:5
    healthcheck:
      test: ["CMD-SHELL", "celery -A tasks inspect ping -t 5 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    mem_limit: 512m
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      <<: *tz_env
      POSTGRES_DB: kb_system
      POSTGRES_USER: kb_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=256MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb_admin -d kb_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    mem_limit: 256m
    ports:
      - "127.0.0.1:6333:6333"
    environment:
      <<: *tz_env
      QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD_KB: 10000
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e 'GET /healthz HTTP/1.0\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200 OK'"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    mem_limit: 128m
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      <<: *tz_env
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3

  minio:
    image: minio/minio:latest
    mem_limit: 256m
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      <<: *tz_env
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── skillhub-backend ─────────────────────────────────────────────────────
  # 独立小站 skillhub.tokenwave.cloud,不复用主 backend / users。
  # 复用 postgres 实例(独立 DB=skillhub),复用主 frontend 容器的 443 端口反代。
  skillhub-backend:
    image: ${SKILLHUB_BACKEND_IMAGE:-kb-skillhub-backend:latest}
    build: ./skillhub/backend
    env_file: .env
    mem_limit: 384m
    environment:
      <<: *tz_env
      SKILLHUB_DB_HOST: postgres
      SKILLHUB_DB_PORT: "5432"
      SKILLHUB_DB_USER: kb_admin
      SKILLHUB_DB_PASSWORD: ${POSTGRES_PASSWORD}
      SKILLHUB_DB_NAME: skillhub
    expose:
      - "8001"
    volumes:
      - skillhub_data:/data/skillhub
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    dns_opt:
      - ndots:5
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ── skillhub-frontend ────────────────────────────────────────────────────
  skillhub-frontend:
    image: ${SKILLHUB_FRONTEND_IMAGE:-kb-skillhub-frontend:latest}
    build: ./skillhub/frontend
    mem_limit: 128m
    environment:
      <<: *tz_env
    expose:
      - "80"
    depends_on:
      skillhub-backend:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  # 引用 new-api compose 起的内部网络,让 celery_worker 能直连 new-api-postgres
  # 服务器上实际名字是 new-api_new-api-internal(由 /opt/new-api compose 创建)
  newapi_ext:
    external: true
    name: new-api_new-api-internal

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  upload_data:
  skillhub_data:
