# HTTPS — uat.tokenwave.cloud(新前端预览域)
# 由 frontend-prod 容器持证 + 处理 TLS,然后 proxy_pass 到 frontend-uat 容器
# 这样 uat 部署只动 frontend-uat,不影响 prod 容器
server {
    listen 443 ssl;
    http2 on;
    server_name uat.tokenwave.cloud;
    charset utf-8;
    client_max_body_size 100m;

    ssl_certificate     /etc/letsencrypt/live/uat.tokenwave.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uat.tokenwave.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # health 单独直接返(prod 容器自己回,不走 uat 容器)
    location = /health { access_log off; return 200 'ok'; default_type text/plain; }

    # /api/* → 后端(uat 也用同一个 backend)
    location ~ ^/(api|health)(/|$) {
        proxy_pass            http://backend:8000;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_read_timeout    180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_buffering       off;
        proxy_request_buffering off;
        client_max_body_size  50m;
    }

    # 其余所有请求(SPA 静态资源 + 路由) → 转发到 frontend-uat 容器
    # frontend-uat 容器内自己处理 SPA fallback / 根 302 → /console
    location / {
        proxy_pass            http://frontend-uat:80;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_read_timeout    60s;
        proxy_connect_timeout 5s;
    }
}
