# ─── skillhub.tokenwave.cloud ──────────────────────────────────────────────
# 独立小站,前端 SPA 在 skillhub-frontend 容器,后端 API 在 skillhub-backend:8001
# 由 frontend-prod 容器持证 + 反代;证书未签发时走 HTTP fallback(server_name 兜底 80)
#
# /api/*  → skillhub-backend:8001
# 其余     → skillhub-frontend:80(SPA 静态)
# ───────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name skillhub.tokenwave.cloud;

    # ACME challenge 走 webroot(给 certbot 用)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # 证书签发后由 entrypoint 把 SKILLHUB_REDIRECT_START/END 之间这段还原成 301
    # === SKILLHUB_REDIRECT_START ===
    # 默认 HTTP 也直通到前端容器(未签发证书时让人能进去先用)
    location / {
        proxy_pass            http://skillhub-frontend:80;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
    }
    # === SKILLHUB_REDIRECT_END ===

    location ~ ^/api(/|$) {
        proxy_pass            http://skillhub-backend:8001;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_read_timeout    180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_buffering       off;
        proxy_request_buffering off;
        client_max_body_size  60m;
    }
}

