# ─── aihub.tokenwave.cloud ─────────────────────────────────────────────────
# new-api(LLM 网关聚合站),容器 new-api:3000,跑在独立 compose /opt/new-api/
# 通过 external network kb-system_default 接进来;模式同 skillhub:
#   - 证书未签发时由 entrypoint 剥掉 AIHUB_HTTPS_START..END 段
#   - 证书就位后 entrypoint 把 AIHUB_REDIRECT_START..END 段替换成 301
# ───────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name aihub.tokenwave.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # === AIHUB_REDIRECT_START ===
    # 证书签发前 HTTP 也直通,签发后由 entrypoint 替换成 301
    location / {
        proxy_pass            http://new-api:3000;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_buffering       off;
        proxy_request_buffering off;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        client_max_body_size  100m;
    }
    # === AIHUB_REDIRECT_END ===
}

# === AIHUB_HTTPS_START === (entrypoint 在证书未签发时会剥掉这一段)
server {
    listen 443 ssl;
    http2 on;
    server_name aihub.tokenwave.cloud;
    charset utf-8;
    client_max_body_size 100m;

    ssl_certificate     /etc/letsencrypt/live/aihub.tokenwave.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aihub.tokenwave.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /health { access_log off; return 200 'ok'; default_type text/plain; }

    # new-api 全量反代;流式响应必须关 buffering
    location / {
        proxy_pass            http://new-api:3000;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_buffering       off;
        proxy_request_buffering off;
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout 10s;
    }
}
# === AIHUB_HTTPS_END ===

# HTTPS — uat.tokenwave.cloud(新前端预览域)
# 由 frontend-prod 容器持证 + 处理 TLS,然后 proxy_pass 到 frontend-uat 容器
# 这样 uat 部署只动 frontend-uat,不影响 prod 容器
server {
    listen 443 ssl;
    http2 on;
    server_name uat.tokenwave.cloud;
    charset utf-8;
    client_max_body_size 100m;

    ssl_certificate     /etc/letsencrypt/live/uat.tokenwave.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uat.tokenwave.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com https://cdn.tailwindcss.com; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # health 单独直接返(prod 容器自己回,不走 uat 容器)
    location = /health { access_log off; return 200 'ok'; default_type text/plain; }

    # /api/* → 后端(uat 也用同一个 backend)
    location ~ ^/(api|health)(/|$) {
        proxy_pass            http://backend:8000;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_read_timeout    180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_buffering       off;
        proxy_request_buffering off;
    }

    # 其余所有请求(SPA 静态资源 + 路由) → 转发到 frontend-uat 容器
    # frontend-uat 容器内自己处理 SPA fallback / 根 302 → /console
    location / {
        proxy_pass            http://frontend-uat:80;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_read_timeout    60s;
        proxy_connect_timeout 5s;
    }
}
