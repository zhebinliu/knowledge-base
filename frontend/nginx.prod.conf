# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# nginx.prod.conf — frontend 容器(kb 正式版,只对 docker 内网暴露 :80)
#
# 2026-07-14 起 TLS / 多域名路由全部迁到独立 edge 容器(edge/nginx.conf),
# 本容器角色收窄为(模式同 frontend-uat):
#   1. 服务自己的 dist(/usr/share/nginx/html)— kb.liii.in / kb.tokenwave.cloud 正式版
#   2. 接受来自 edge 容器的 proxy_pass,处理 SPA fallback / 缓存策略 / 维护标志
#   3. /api/* 透传到 backend
# 不做 TLS — 由 edge 终止 TLS 后 plain HTTP 转发进来。
# 好处:kb 前端部署只重建本容器,edge(80/443 入口)不动,
# aihub/skillhub/kanban/studio/uat 全程无感。
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    client_max_body_size 100m;

    # backend 容器重建换 IP 自愈:按请求(10s 缓存)解析容器名,不再启动时解析一次
    resolver 127.0.0.11 valid=10s ipv6=off;

    # 健康检查 — docker healthcheck 用
    location = /health { access_log off; return 200 'ok'; default_type text/plain; }

    # 维护标志:host volume /opt/kb-system/run 挂进来,部署期返回 503 + 维护页
    location = /maintenance.html { try_files /maintenance.html =404; }
    set $maintenance "";
    if (-f /var/run/kb-deploy/.maintenance) { set $maintenance "on"; }

    # /api(无 trailing slash)渲染 SPA 的 ApiDocs 页面,不走 backend
    location = /api { try_files /index.html =404; }

    # /ds.md — markdown 文件以 text/markdown 直出
    location = /ds.md {
        types { }
        default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "public, max-age=300" always;
        try_files /ds.md =404;
    }
    # /llms.txt — LLM 信息文件
    location = /llms.txt {
        types { }
        default_type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=300" always;
        try_files /llms.txt =404;
    }

    # /course 301 + /course/*.md markdown content-type
    location = /course { return 301 /course/; }
    location ~ ^/course/.*\.md$ {
        types { }
        default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # /api/* → backend
    location ~ ^/(api|health)(/|$) {
        if ($maintenance = "on") { return 503; }
        set $backend_upstream backend;
        proxy_pass            http://$backend_upstream:8000;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_read_timeout    180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_buffering       off;
        proxy_request_buffering off;
    }

    # SPA fallback — try_files 回落到 index.html 时不走 location = /index.html,
    # 必须在这里也加 no-cache,否则浏览器/代理缓存旧 HTML → 引用已删除的 hashed JS → 白屏
    location / {
        if ($maintenance = "on") { return 503; }
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    # index.html 永远不缓存 — 部署后用户立刻看到新 dist 引用的 hashed 资源
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # version.json 永远不缓存 — VersionWatcher 每 60s poll 它检测新版本,
    # 任何中间缓存把它兜住就废了
    location = /version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        default_type application/json;
    }

    # hashed 资源永久缓存(文件名变了浏览器自然换)
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    error_page 503 = @maintenance_503;
    location @maintenance_503 {
        internal;
        add_header Cache-Control "no-store" always;
        add_header Retry-After 30 always;
        try_files /maintenance.html =503;
    }
}
