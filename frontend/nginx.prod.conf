# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# nginx.prod.conf — frontend-prod 容器
# 角色:
#   1. kb.liii.in / kb.tokenwave.cloud  → 服务自己的 dist(线上正式版)
#   2. uat.tokenwave.cloud              → proxy_pass 到 frontend-uat 容器
#   3. 持有 80/443 端口 + 三个域名的 Let's Encrypt 证书
# 共享 upstream:
#   backend: kb-system 内部 docker network 的 backend:8000
#   frontend-uat: 同 docker network 的 frontend-uat:80(无 SSL)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# HTTP — serve ACME challenges, redirect everything else to HTTPS
server {
    listen 80 default_server;
    server_name _;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # docker healthcheck 走 http://127.0.0.1/health — 不能跟着 301 到 HTTPS
    # (cert SAN 没有 127.0.0.1,TLS 握手会失败 → 容器长期 unhealthy)
    location = /health { access_log off; return 200 'ok'; default_type text/plain; }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — kb.liii.in(生产正式)
server {
    listen 443 ssl;
    http2 on;
    server_name kb.liii.in;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    client_max_body_size 100m;

    ssl_certificate     /etc/letsencrypt/live/kb.liii.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kb.liii.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    location = /health { access_log off; return 200 'ok'; default_type text/plain; }

    location = /maintenance.html { try_files /maintenance.html =404; }
    set $maintenance "";
    if (-f /var/run/kb-deploy/.maintenance) { set $maintenance "on"; }

    location = /api { try_files /index.html =404; }

    location ~ ^/(api|health)(/|$) {
        if ($maintenance = "on") { return 503; }
        proxy_pass            http://backend:8000;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_read_timeout    180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_buffering       off;
        proxy_request_buffering off;
        client_max_body_size  50m;
    }

    location = /ds.md {
        types { }
        default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "public, max-age=300" always;
        try_files /ds.md =404;
    }
    location = /llms.txt {
        types { }
        default_type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=300" always;
        try_files /llms.txt =404;
    }

    location = /course { return 301 /course/; }
    location ~ ^/course/.*\.md$ {
        types { }
        default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location / {
        if ($maintenance = "on") { return 503; }
        try_files $uri $uri/ /index.html;
    }

    # index.html 永远不缓存 — 部署后用户立刻看到新 dist 引用的 hashed 资源
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    error_page 503 = @maintenance_503;
    location @maintenance_503 {
        internal;
        add_header Cache-Control "no-store" always;
        add_header Retry-After 30 always;
        try_files /maintenance.html =503;
    }
}

