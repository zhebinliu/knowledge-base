# ─── aihub.tokenwave.cloud ─────────────────────────────────────────────────
# new-api(LLM 网关聚合站),容器 new-api:3000,跑在独立 compose /opt/new-api/
# 通过 external network kb-system_default 接进来;模式同 skillhub:
#   - 证书未签发时由 entrypoint 剥掉 AIHUB_HTTPS_START..END 段
#   - 证书就位后 entrypoint 把 AIHUB_REDIRECT_START..END 段替换成 301
# ───────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name aihub.tokenwave.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # === AIHUB_REDIRECT_START ===
    # 证书签发前 HTTP 也直通,签发后由 entrypoint 替换成 301
    location / {
        proxy_pass            http://new-api:3000;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_buffering       off;
        proxy_request_buffering off;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        client_max_body_size  100m;
    }
    # === AIHUB_REDIRECT_END ===
}

# === AIHUB_HTTPS_START === (entrypoint 在证书未签发时会剥掉这一段)
server {
    listen 443 ssl;
    http2 on;
    server_name aihub.tokenwave.cloud;
    charset utf-8;
    client_max_body_size 100m;

    ssl_certificate     /etc/letsencrypt/live/aihub.tokenwave.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aihub.tokenwave.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /health { access_log off; return 200 'ok'; default_type text/plain; }

    # /help → 静态接入手册(host 上 /opt/aihub-docs 维护)
    location = /help  { return 301 /help/; }
    location /help/ {
        alias /usr/share/nginx/aihub-help/;
        index index.html;
        try_files $uri $uri/ /help/index.html;
        add_header Cache-Control "public, max-age=300" always;
    }

    # /aihub-admin/* → aihub-tap 管理查询 API(余额 / 消耗)
    # 鉴权:必须带 X-Admin-Key header,key 在 /opt/aihub-tap/.env (AIHUB_ADMIN_KEY)
    location /aihub-admin/ {
        proxy_pass            http://aihub-tap:8080;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;
        proxy_connect_timeout 10s;
    }

    # /v1/* → aihub-tap:8080 透明记录代理(req+resp 写 /opt/aihub-tap/logs/tap.jsonl)
    # 只拦 LLM 调用路径,/api/*(admin) 和静态资源继续直连 new-api
    location ~ ^/v1/ {
        proxy_pass            http://aihub-tap:8080;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_buffering       off;
        proxy_request_buffering off;
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout 10s;
    }

    # new-api 全量反代;流式响应必须关 buffering
    location / {
        proxy_pass            http://new-api:3000;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_buffering       off;
        proxy_request_buffering off;
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout 10s;
    }
}
# === AIHUB_HTTPS_END ===

# ─── kanban.tokenwave.cloud ────────────────────────────────────────────────
# Plane 看板(开源 Jira/Linear 替代),全家桶跑在独立 compose /opt/kanban/。
# 入口是 Plane 自带的 Caddy proxy(容器在 kb-system_default 网络上别名 plane-proxy,
# 监听 :80 纯 HTTP),它再路由到内部 web/api/space/admin/live。模式同 aihub:
#   - 证书未签发时由 entrypoint 剥掉 KANBAN_HTTPS_START..END 段
#   - 证书就位后 entrypoint 把 KANBAN_REDIRECT_START..END 段替换成 301
# 注意:upstream 故意用 resolver + 变量延迟解析 —— plane-proxy 容器没起时 nginx
# 照常启动(仅 kanban 域名 502,不连累其它站点)。aihub/skillhub 的静态
# proxy_pass 写法在 upstream 缺失时会让整个 nginx 起不来,新站别再沿用。
# ───────────────────────────────────────────────────────────────────────────

# Plane 实时协作走 websocket,Upgrade/Connection 头按请求透传
map $http_upgrade $kanban_connection_upgrade {
    default upgrade;
    ''      "";
}

server {
    listen 80;
    server_name kanban.tokenwave.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # === KANBAN_REDIRECT_START ===
    # 证书签发前 HTTP 也直通,签发后由 entrypoint 替换成 301
    location / {
        resolver              127.0.0.11 valid=30s ipv6=off;
        set $kanban_upstream  plane-proxy:80;
        proxy_pass            http://$kanban_upstream;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Upgrade           $http_upgrade;
        proxy_set_header      Connection        $kanban_connection_upgrade;
        # Plane 前端默认读 localStorage;清掉压缩头后才能注入默认中文种子。
        proxy_set_header      Accept-Encoding   "";
        proxy_buffering       off;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 10s;
        client_max_body_size  100m;
        sub_filter_once       on;
        sub_filter            '<html lang="en">' '<html lang="zh-CN">';
        sub_filter            '<head>' '<head><script>try{var k="planeDefaultLanguageSeeded",v="zh-CN-20260611";if(localStorage.getItem(k)!==v){localStorage.setItem("userLanguage","zh-CN");localStorage.setItem(k,v)}document.documentElement.lang="zh-CN"}catch(e){}</script>';
    }
    # === KANBAN_REDIRECT_END ===
}

# === KANBAN_HTTPS_START === (entrypoint 在证书未签发时会剥掉这一段)
server {
    listen 443 ssl;
    http2 on;
    server_name kanban.tokenwave.cloud;
    charset utf-8;
    client_max_body_size 100m;

    ssl_certificate     /etc/letsencrypt/live/kanban.tokenwave.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kanban.tokenwave.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 内部访问 —— 整站 Basic Auth 入口密码(host 维护 /opt/kb-system/kanban.htpasswd,
    # 经 compose volume 挂载进容器 /etc/nginx/kanban.htpasswd)。浏览器输一次后
    # 对本域所有请求(SPA / API / websocket)自动带凭证。改密码只改 host 文件 + reload。
    auth_basic           "kanban internal only";
    auth_basic_user_file /etc/nginx/kanban.htpasswd;

    # health 探活不要密码(docker healthcheck / 监控可达)
    location = /health { auth_basic off; access_log off; return 200 'ok'; default_type text/plain; }

    location / {
        resolver              127.0.0.11 valid=30s ipv6=off;
        set $kanban_upstream  plane-proxy:80;
        proxy_pass            http://$kanban_upstream;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Upgrade           $http_upgrade;
        proxy_set_header      Connection        $kanban_connection_upgrade;
        # Plane 前端默认读 localStorage;清掉压缩头后才能注入默认中文种子。
        proxy_set_header      Accept-Encoding   "";
        proxy_buffering       off;
        # websocket 长连接,放宽读写超时
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 10s;
        sub_filter_once       on;
        sub_filter            '<html lang="en">' '<html lang="zh-CN">';
        sub_filter            '<head>' '<head><script>try{var k="planeDefaultLanguageSeeded",v="zh-CN-20260611";if(localStorage.getItem(k)!==v){localStorage.setItem("userLanguage","zh-CN");localStorage.setItem(k,v)}document.documentElement.lang="zh-CN"}catch(e){}</script>';
    }
}
# === KANBAN_HTTPS_END ===

# HTTPS — uat.tokenwave.cloud(新前端预览域)
# 由 frontend-prod 容器持证 + 处理 TLS,然后 proxy_pass 到 frontend-uat 容器
# 这样 uat 部署只动 frontend-uat,不影响 prod 容器
server {
    listen 443 ssl;
    http2 on;
    server_name uat.tokenwave.cloud;
    charset utf-8;
    client_max_body_size 100m;

    ssl_certificate     /etc/letsencrypt/live/uat.tokenwave.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uat.tokenwave.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com https://cdn.tailwindcss.com; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # uat 预览已下线(2026-07-14):不再反代 frontend-uat 容器,统一 302 到生产。
    # 关键:去掉对 frontend-uat 的静态 proxy_pass —— 否则该容器一停,nginx 解析不到
    # 这个 upstream,reload/启动会整体失败(下面 studio 段用 resolver 规避;uat 直接下线更省事)。
    location = /health { access_log off; return 200 'ok'; default_type text/plain; }
    location / { return 302 https://kb.liii.in$request_uri; }
}

# ─── studio.tokenwave.cloud(自进化文档工作台 pm-doc-studio)─────────────────
# 独立 compose 项目 `pmds`(容器 pmds-studio,接入 external network kb-system_default)。
# 由 frontend-prod 持证 + TLS,反代到 pmds-studio:8080。模式同 uat:
#   - HTTP→HTTPS + ACME 由顶部 `listen 80 default_server` 兜底,无需单独 80 块
#   - 证书在同一 /etc/letsencrypt 挂载里,始终存在 → 可像 uat 一样裸加(不需 STRIP 守卫)
#   - resolver 127.0.0.11 按请求解析:pmds-studio 重建换 IP 不用 reload,暂时不可达也不挡 nginx 启动
# 把这段并入本文件 = studio 反代随 frontend 镜像烘进去,KB 每次重新部署都不再丢。
server {
    listen 443 ssl;
    http2 on;
    server_name studio.tokenwave.cloud;
    charset utf-8;
    client_max_body_size 12m;   # studio /api/extract 收 <8MB 文档,默认 1m 会 413

    ssl_certificate     /etc/letsencrypt/live/studio.tokenwave.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/studio.tokenwave.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /health { access_log off; return 200 'ok'; default_type text/plain; }

    resolver 127.0.0.11 valid=30s ipv6=off;
    location / {
        set $pmds_upstream pmds-studio;
        proxy_pass            http://$pmds_upstream:8080;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_read_timeout    180s;
        proxy_connect_timeout 10s;
        proxy_buffering       off;
        proxy_request_buffering off;
    }
}
