# HTTP — serve ACME challenges, redirect everything else to HTTPS
server {
    listen 80 default_server;
    server_name _;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — kb.liii.in
server {
    listen 443 ssl;
    http2 on;
    server_name kb.liii.in;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    ssl_certificate     /etc/letsencrypt/live/kb.liii.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kb.liii.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # /api (exact) → SPA API-docs page; /api/* → backend proxy
    location = /api { try_files /index.html =404; }

    location ~ ^/(api|health)(/|$) {
        proxy_pass            http://backend:8000;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_read_timeout    180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_buffering       off;
        proxy_request_buffering off;
        client_max_body_size  50m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

