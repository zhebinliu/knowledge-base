# HTTP — serve ACME challenges, redirect everything else to HTTPS
server {
    listen 80 default_server;
    server_name _;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — kb.liii.in
server {
    listen 443 ssl;
    http2 on;
    server_name kb.liii.in;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    client_max_body_size 100m;

    ssl_certificate     /etc/letsencrypt/live/kb.liii.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kb.liii.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000" always;
    # 2026-05-12 加:基础安全 header(CSP unsafe-inline 给 Tailwind / inline style 留口子,后续 nonce 化迁移)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(), payment=()" always;
    # CSP — script-src/style-src 白名单了 /course 和 /estimate 静态页用到的 CDN:
    #   cdn.jsdelivr.net(marked.js)/ unpkg.com(React UMD + Babel standalone)
    #   fonts.googleapis.com(CSS)/ fonts.gstatic.com(字体文件)
    #   'unsafe-eval' 给 Babel standalone(用 new Function() 编译 JSX)
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # 健康检查 — 给 Docker healthcheck 用,无需鉴权(2026-05-12)
    # 注意:不受维护模式拦截(精确匹配 + 单独 location),供 maintenance.html 轮询恢复用
    location = /health { access_log off; return 200 'ok'; default_type text/plain; }

    # 维护模式:host 上 touch /opt/kb-system/run/.maintenance 即触发,deploy 完成 rm 即恢复
    # 维护页 /maintenance.html(从 vite public/ 打到 nginx html 根)永远 200,不受 flag 影响
    location = /maintenance.html { try_files /maintenance.html =404; }
    set $maintenance "";
    if (-f /var/run/kb-deploy/.maintenance) { set $maintenance "on"; }

    # /api (exact) → SPA API-docs page; /api/* → backend proxy
    location = /api { try_files /index.html =404; }

    location ~ ^/(api|health)(/|$) {
        if ($maintenance = "on") { return 503; }
        proxy_pass            http://backend:8000;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_read_timeout    180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_buffering       off;
        proxy_request_buffering off;
        client_max_body_size  50m;
    }

    # AI-friendly plain-text / markdown — force correct content-type
    location = /ds.md {
        types { }
        default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "public, max-age=300" always;
        try_files /ds.md =404;
    }
    location = /llms.txt {
        types { }
        default_type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=300" always;
        try_files /llms.txt =404;
    }

    # AI 系列课程(静态站点)
    location = /course { return 301 /course/; }
    location ~ ^/course/.*\.md$ {
        types { }
        default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location / {
        if ($maintenance = "on") { return 503; }
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 维护期返回 503 时 serve 升级页(同时影响 / 与 /api/* 调用)
    error_page 503 = @maintenance_503;
    location @maintenance_503 {
        internal;
        add_header Cache-Control "no-store" always;
        add_header Retry-After 30 always;
        try_files /maintenance.html =503;
    }
}

