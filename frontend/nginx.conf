server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Proxy all /api/* and /health* to the FastAPI backend
    location ~ ^/(api|health)(/|$) {
        proxy_pass            http://backend:8000;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      Connection        "";   # keepalive to backend
        proxy_read_timeout    180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        # Disable response buffering so streaming/large responses go straight to client
        proxy_buffering       off;
        proxy_request_buffering off;
        client_max_body_size  50m;
    }

    # SPA fallback — serve index.html for any path that isn't a real file
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
