      // canvas 底色 / 圆角也按 ds 标准修正。
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                DEFAULT: '#FF7A00',
                deep: '#D96400',
              },
              // 全部映射到 brand 橙系(覆盖 Tailwind 默认蓝色)
              blue: {
                50:  '#FFF5EB', 100: '#FFE6CC', 200: '#FFD8AD',
                300: '#FFC18A', 400: '#FFA561', 500: '#FF7A00',
                600: '#FF7A00', 700: '#D96400', 800: '#A84E00',
                900: '#7A3800',
              },
              indigo: {
                50:  '#FFF5EB', 100: '#FFE6CC', 200: '#FFD8AD',
                300: '#FFC18A', 400: '#FFA561', 500: '#FF7A00',
                600: '#FF7A00', 700: '#D96400', 800: '#A84E00',
                900: '#7A3800',
              },
              // 跟 ds canvas 对齐
              canvas: '#F7F7F8',
              ink: { DEFAULT: '#1A1A1A', secondary: '#4A4A4A', muted: '#8A8A8A' },
              line: '#E5E7EB',
            },
            borderRadius: {
              // ds 卡片标准 12px;原 estimate 用了 rounded-2xl(16px),收紧到 12px 视觉更克制
              '2xl': '0.75rem',
            },
            fontFamily: {
              sans: ['-apple-system', 'BlinkMacSystemFont', 'PingFang SC',

      /* 表头去 uppercase tracking-wider — ds 风偏好克制中文字面 */
      .ds-no-upper { text-transform: none !important; letter-spacing: normal !important; }
      /* 滑动条主色:橙(原 accent-blue-600 → brand) */
      input[type="range"] { accent-color: #FF7A00; }

        // --- 公式解析引擎 ---
        const calculateWorkload = (formula, N1, N2) => {
            if (typeof formula === 'number') return formula;
            if (!formula) return 0;
            if (typeof formula === 'string') {
                try {
                    let expr = formula.replace(/N1/g, N1).replace(/N2/g, N2);
                    return new Function(`"use strict"; return (${expr});`)();
                } catch (e) {
                    console.error("公式解析错误:", formula, e);
                    return 0;
                }
            }
            return 0;
        };

            const [isLoading, setIsLoading] = useState(true);
            const [config, setConfig] = useState(null);

            const [dataSourceStatus, setDataSourceStatus] = useState('online');

            const [dailyRate, setDailyRate] = useState(3500); 
            const [objectCountN1, setObjectCountN1] = useState(3); 
            const [objectCountN2, setObjectCountN2] = useState(1);

            const [expandedPhases, setExpandedPhases] = useState([]);
            const [isImpactExpanded, setIsImpactExpanded] = useState(false); 
            const [impactVars, setImpactVars] = useState({});
            const [activeTooltip, setActiveTooltip] = useState(null);

            // ==========================================
            // 数据拉取与多级降级逻辑
            // ==========================================
            useEffect(() => {
                const fetchConfig = async () => {
                    let data = fallbackConfig;
                    
                    if (EXTERNAL_CONFIG_URL) {
                        try {
                            const urlWithTimestamp = `${EXTERNAL_CONFIG_URL}?t=${new Date().getTime()}`;
                            const response = await fetch(urlWithTimestamp, { cache: 'no-store' });
                            
                            if (response.ok) {
                                data = await response.json();
                                // 拉取成功，保存到 localStorage 作为备用缓存
                                localStorage.setItem(CONFIG_CACHE_KEY, JSON.stringify(data));
                                setDataSourceStatus('online');
                            } else {
                                throw new Error(`HTTP Error: ${response.status}`);
                            }
                        } catch (error) {
                            console.warn("网络拉取外部配置失败，准备尝试读取本地缓存...", error);
                            
                            // 尝试从 localStorage 提取缓存
                            const cachedData = localStorage.getItem(CONFIG_CACHE_KEY);
                            if (cachedData) {
                                try {
                                    data = JSON.parse(cachedData);
                                    setDataSourceStatus('cached'); 
                                    console.log("已成功加载本地缓存数据。");
                                } catch (parseError) {
                                    console.error("缓存数据解析失败，退回默认配置。", parseError);
                                    setDataSourceStatus('fallback');
                                }
                            } else {
                                console.warn("无可用本地缓存，已退回内置预设配置。");
                                setDataSourceStatus('fallback');
                            }
                        }
                    } else {
                        setDataSourceStatus('fallback');
                    }
                    
                    setConfig(data);
                    
                    // 初始化变量
                    const initialImpacts = {};
                    if(data.impactDimensions) {
                        data.impactDimensions.forEach(dim => initialImpacts[dim.id] = dim.default);
                    }
                    setImpactVars(initialImpacts);
                    
                    // 默认展开所有阶段
                    if(data.phases) {
                        setExpandedPhases(data.phases.map(p => p.id));
                    }
                    setIsLoading(false);
                };

                fetchConfig();
            }, []);

            const toggleProduct = (id) => setSelectedProductIds(prev => prev.includes(id) ? prev.filter(pid => pid !== id) : [...prev, id]);
            const togglePhase = (phaseId) => setExpandedPhases(prev => prev.includes(phaseId) ? prev.filter(id => id !== phaseId) : [...prev, phaseId]);
            const toggleAllPhases = () => {
                if (!config || !config.phases) return;
                if (expandedPhases.length === config.phases.length) setExpandedPhases([]); 
                else setExpandedPhases(config.phases.map(p => p.id)); 
            };
            const toggleTooltip = (id) => setActiveTooltip(prev => prev === id ? null : id);

            // 获取选中的产品列表
            const selectedProducts = useMemo(() => {
                if (!config || !config.products) return [];
                return config.products.filter(p => selectedProductIds.includes(p.id));
            }, [selectedProductIds, config]);

            // --- 核心计算逻辑 ---
            const totalImpactMultiplier = useMemo(() => {
                return Object.values(impactVars).reduce((acc, val) => acc * val, 1);
            }, [impactVars]);
            
            const finalComplexity = totalImpactMultiplier;

            // 计算矩阵数据
            const { matrixData, hasCappedTriggered } = useMemo(() => {
                if (!config || !config.phases) return { matrixData: [], hasCappedTriggered: false };

                const safeN1 = isNaN(objectCountN1) || objectCountN1 < 1 ? 1 : objectCountN1;
                const safeN2 = isNaN(objectCountN2) || objectCountN2 < 1 ? 1 : objectCountN2;
                let anyCapped = false;

                const data = config.phases.map(phase => {
                    let phaseRowTotal = 0;
                    const productPhaseTotals = selectedProducts.map(p => ({ id: p.id, days: 0 }));

                    const processedSubTasks = phase.subTasks.map(sub => {
                        let subRowTotalBase = 0;
                        const productValues = selectedProducts.map((product, pIdx) => {
                            let days = 0;
                            if (sub.isDynamicApi) {
                                days = (apiCounts[product.id] || 0) * 3;
                            } else {
                                days = calculateWorkload(product.workloads[sub.id], safeN1, safeN2);
                            }
                            subRowTotalBase += days;
                            productPhaseTotals[pIdx].days += days; 
                            
                            return { 
                                productId: product.id, 
                                baseDays: days,
                                days: days * finalComplexity
                            };
                        });
                        
                        let originalRowTotal = subRowTotalBase * finalComplexity;
                        let finalRowTotal = originalRowTotal;
                        let isCapped = false;
                        
                        if (sub.cap && originalRowTotal > sub.cap) {
                            finalRowTotal = sub.cap;
                            isCapped = true;
                            anyCapped = true;
                        }

                        phaseRowTotal += finalRowTotal; 
                        
                        return {
                            ...sub,
                            productValues,
                            originalRowTotal, 
                            isCapped,
                            rowTotal: finalRowTotal 
                        };
                    });

                    return {
                        ...phase,
                        subTasks: processedSubTasks,
                        productTotals: productPhaseTotals.map(pt => ({ 
                            productId: pt.id, 
                            days: pt.days * finalComplexity 
                        })),
                        rowTotal: phaseRowTotal
                    };
                });

                return { matrixData: data, hasCappedTriggered: anyCapped };
            }, [selectedProducts, finalComplexity, objectCountN1, objectCountN2, apiCounts, config]); 

            const totalDays = useMemo(() => matrixData.reduce((sum, phase) => sum + phase.rowTotal, 0), [matrixData]);
            const totalPrice = totalDays * dailyRate;

            // 导出带有样式的 Excel
            const handleExportExcel = () => {
                const escapeHTML = (str) => String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                let html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><style>table { border-collapse: collapse; width: 100%; font-family: 'Microsoft YaHei', sans-serif; } th, td { border: 1px solid #d1d5db; padding: 10px 12px; font-size: 14px; } .title { font-size: 22px; font-weight: bold; text-align: center; padding: 20px; background-color: #ffffff; border: none; color: #1e293b; } .header { background-color: #f1f5f9; font-weight: bold; text-align: center; color: #334155; } .phase-row { background-color: #e2e8f0; font-weight: bold; color: #0f172a; } .sub-row { background-color: #ffffff; color: #475569; } .capped-cell { color: #b91c1c; font-weight: bold; } .footer-row { background-color: #1e293b; color: #ffffff; font-weight: bold; font-size: 16px; } .total-days { color: #fde047; font-size: 20px; font-weight: 900; } .text-center { text-align: center; } .text-right { text-align: right; } .note { font-size: 12px; color: #64748b; font-style: italic; }</style></head><body><table>`;

                const colsCount = 2 + selectedProducts.length;
                html += `<tr><th colspan="${colsCount}" class="title">AI产品交付工作量评估矩阵</th></tr>`;
                html += `<tr><th class="header">任务阶段与细分执行项</th>`;
                selectedProducts.forEach(p => { html += `<th class="header">${escapeHTML(p.name)}</th>`; });
                html += `<th class="header">阶段小计(人天)</th></tr>`;

                matrixData.forEach(phase => {
                    html += `<tr class="phase-row"><td>${escapeHTML(phase.name)}</td>${phase.productTotals.map(pt => `<td class="text-center">${pt.days > 0 ? pt.days.toFixed(1) : '-'}</td>`).join('')}<td class="text-right">${phase.rowTotal.toFixed(1)}</td></tr>`;
                    phase.subTasks.forEach(sub => {
                        let nameSuffix = '';
                        if (sub.isDynamicApi) nameSuffix = ' <span class="note">(按填写接口数计算)</span>';
                        if (sub.isCapped) nameSuffix += ` <span class="note">(已触发合并上限封顶 ${sub.cap} 人天)</span>`;
                        html += `<tr class="sub-row"><td style="padding-left: 30px;">- ${escapeHTML(sub.name)}${nameSuffix}</td>${sub.productValues.map(pv => `<td class="text-center">${pv.days > 0 ? pv.days.toFixed(1) : '-'}</td>`).join('')}<td class="text-right ${sub.isCapped ? 'capped-cell' : ''}">${sub.rowTotal.toFixed(1)}</td></tr>`;
                    });
                });

                html += `<tr class="footer-row"><td style="text-align: right; padding-right: 20px;">产品各自累计及封顶后总计</td>`;
                selectedProducts.forEach(product => {
                    const ptDays = matrixData.reduce((acc, ph) => acc + (ph.productTotals.find(p => p.productId === product.id)?.days || 0), 0);
                    html += `<td class="text-center">${ptDays.toFixed(1)}</td>`;
                });
                html += `<td class="text-right total-days">${totalDays.toFixed(1)}</td></tr>`;
                
                if (hasCappedTriggered) {
                    html += `<tr><td colspan="${colsCount}" style="color: #b91c1c; font-size: 12px; border: none; padding-top: 10px;">* 注：因多产品组合交付，培训及验收相关任务已触发合并人天封顶规则，已为您减免超出部分的工作量。</td></tr>`;
                }

                html += `</table></body></html>`;

                const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.setAttribute('href', url);
                link.setAttribute('download', `AI产品交付工作量评估矩阵_${new Date().toISOString().slice(0,10)}.xls`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            if (isLoading || !config) {
                return (
                    <div className="min-h-screen flex items-center justify-center" style={{ background: '#F7F7F8' }}>
                        <div className="flex flex-col items-center">
                            <svg className="animate-spin h-8 w-8 text-brand mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            <span className="text-ink-secondary text-sm">正在加载交付矩阵元数据…</span>
                        </div>
                    </div>
                );
            }

            // 检查是否需要更新系统 (当前的 HTML 版本 < 云端配置的最低要求版本)
            const needsAppUpgrade = config.latestAppVersion && CURRENT_APP_VERSION !== config.latestAppVersion;

            return (
                <div className="min-h-screen p-6 text-ink">
                    <div className="max-w-[1400px] mx-auto space-y-5">

                        {/* 顶部 — KB System 风格的 page head */}
                        <div className="bg-white rounded-2xl shadow-sm border border-line p-5">
                            <div className="flex items-center justify-between flex-wrap gap-3">
                                <div className="flex items-center gap-2 min-w-0">
                                    <a href="https://kb.tokenwave.cloud/" className="kb-back-link" title="返回 KB 主站">
                                        <IconRenderer name="ChevronRight" className="w-3 h-3 rotate-180" />
                                        KB
                                    </a>
                                    <span className="text-ink-muted text-xs">·</span>
                                    <div className="flex items-center gap-2 min-w-0">
                                        <IconRenderer name="Calculator" className="w-5 h-5 text-brand" />
                                        <h1 className="text-xl font-bold text-ink truncate">AI 产品交付工作量与报价评估矩阵</h1>
                                    </div>
                                </div>
                                <div className="flex items-center gap-2 flex-wrap">
                                    {/* 版本徽章 */}
                                    <span className="text-[10.5px] bg-slate-50 text-ink-secondary px-2 py-0.5 rounded border border-line font-mono" title="当前 HTML 系统版本">
                                        App {CURRENT_APP_VERSION}
                                    </span>
                                    {config.dataVersion && (
                                        <span
                                            className="text-[10.5px] bg-orange-50 text-brand-deep px-2 py-0.5 rounded border border-orange-200 font-mono cursor-help"
                                            title={`当前云端数据版本\n${config.dataVersion ? `\n更新说明: ${config.updateLog}` : ''}`}
                                        >
                                            Data {config.dataVersion}
                                        </span>
                                    )}
                                    {dataSourceStatus === 'cached' && (
                                        <span className="text-[10.5px] bg-amber-50 text-amber-700 px-2 py-0.5 rounded border border-amber-200 inline-flex items-center gap-1">
                                            <IconRenderer name="AlertCircle" className="w-3 h-3" />
                                            离线缓存
                                        </span>
                                    )}
                                    {dataSourceStatus === 'fallback' && (
                                        <span className="text-[10.5px] bg-slate-50 text-ink-muted px-2 py-0.5 rounded border border-line inline-flex items-center gap-1">
                                            <IconRenderer name="Info" className="w-3 h-3" />
                                            预设数据
                                        </span>
                                    )}
                                </div>
                            </div>
                            <p className="text-[12.5px] text-ink-muted mt-1.5">
                                支持多产品组合动态合并计算,自动应用多产品合并减免与复杂系数规则。
                            </p>
                        </div>

                        {/* 强制升级提示横幅 — ds 风:克制 alert 卡片,左侧色条 */}
                        {needsAppUpgrade && (
                            <div className="bg-amber-50 border-l-4 border-l-amber-500 border border-amber-200 rounded-r-xl p-3.5 flex items-start gap-2.5">
                                <IconRenderer name="AlertTriangle" className="w-4 h-4 text-amber-600 flex-shrink-0 mt-0.5" />
                                <div className="min-w-0">
                                    <h4 className="text-sm font-semibold text-amber-900">检测到新版本系统</h4>
                                    <p className="text-[12px] text-amber-800 mt-0.5 leading-relaxed">
                                        当前网页版本 <code className="font-mono text-amber-900 bg-amber-100/60 px-1 rounded text-[11px]">{CURRENT_APP_VERSION}</code>,云端最新 <code className="font-mono text-amber-900 bg-amber-100/60 px-1 rounded text-[11px]">{config.latestAppVersion}</code>。
                                        旧版网页可能与最新计算规则不兼容,请联系管理员获取最新 HTML。
                                    </p>
                                </div>
                            </div>
                        )}

                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-6 items-start">
                            
                            {/* 左侧控制面板 */}
                            <div className="lg:col-span-1 space-y-5 sticky top-6">
                                {/* 1. 产品选择 */}
                                <div className="bg-white rounded-2xl shadow-sm border border-line p-5">
                                    <h2 className="text-sm font-semibold text-ink mb-3 flex items-center">
                                        <IconRenderer name="Settings2" className="w-4 h-4 mr-2 text-brand" /> 选择交付产品
                                    </h2>
                                    <div className="space-y-3 max-h-[400px] overflow-y-auto pr-2 pb-2 scrollbar-thin">
                                        {config.products && config.products.map(product => (
                                            <div 
                                                key={product.id}
                                                onClick={() => toggleProduct(product.id)}
                                                className={`cursor-pointer border rounded-xl p-3 transition-all duration-200 ${
                                                    selectedProductIds.includes(product.id) 
                                                        ? 'bg-blue-50 border-blue-300 shadow-inner' 
                                                        : 'bg-white border-slate-200 hover:border-blue-200 hover:bg-slate-50'
                                                }`}
                                            >
                                                <div className="flex items-start">
                                                    {selectedProductIds.includes(product.id) ? (
                                                        <IconRenderer name="CheckSquare" className="w-5 h-5 text-blue-600 mt-0.5 mr-3 flex-shrink-0" />
                                                    ) : (
                                                        <IconRenderer name="Square" className="w-5 h-5 text-slate-300 mt-0.5 mr-3 flex-shrink-0" />
                                                    )}
                                                    <div>
                                                        <div className={`font-medium ${selectedProductIds.includes(product.id) ? 'text-blue-900' : 'text-slate-700'}`}>
                                                            {product.name}
                                                        </div>
                                                        <div className="text-[11px] text-slate-500 mt-1 line-clamp-2 leading-relaxed">
                                                            {product.desc}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* 2. 项目影响维度区域 */}
                                <div className="bg-white rounded-2xl shadow-sm border border-line p-5">
                                    <div
                                        className="flex items-center justify-between cursor-pointer select-none"
                                        onClick={() => setIsImpactExpanded(!isImpactExpanded)}
                                    >
                                        <h2 className="text-sm font-semibold text-ink flex items-center">
                                            <IconRenderer name="SlidersIcon" className="w-4 h-4 mr-2 text-brand" /> 项目复杂度参数
                                        </h2>
                                        {isImpactExpanded ? <IconRenderer name="ChevronDown" className="w-4 h-4 text-ink-muted" /> : <IconRenderer name="ChevronRight" className="w-4 h-4 text-ink-muted" />}
                                    </div>
                                    
                                    {isImpactExpanded && config.impactDimensions && (
                                        <div className="space-y-4 mt-4 pt-4 border-t border-slate-100">
                                            {config.impactDimensions.map(dim => (
                                                <div key={dim.id} className="bg-slate-50 border border-slate-200 rounded-lg p-3">
                                                    <div className="flex justify-between items-center mb-1">
                                                        <div className="flex items-center space-x-1">
                                                            <span className="text-[13px] font-medium text-slate-800">{dim.name}</span>
                                                            <button 
                                                                onClick={(e) => { e.stopPropagation(); toggleTooltip(dim.id); }} 
                                                                className={`focus:outline-none transition-colors ${activeTooltip === dim.id ? 'text-blue-600' : 'text-slate-400 hover:text-blue-500'}`}
                                                            >
                                                                <IconRenderer name="Info" className="w-3.5 h-3.5" />
                                                            </button>
                                                        </div>
                                                        <span className="text-xs font-bold text-blue-600 bg-blue-100 px-1.5 py-0.5 rounded">{impactVars[dim.id]}x</span>
                                                    </div>
                                                    
                                                    {activeTooltip === dim.id && (
                                                        <div className="text-[11px] text-slate-600 bg-blue-50 border border-blue-100 p-2 rounded-md mb-3 leading-relaxed">
                                                            {dim.desc}
                                                        </div>
                                                    )}

                                                    <input 
                                                        type="range" 
                                                        min={dim.min} max={dim.max} step={dim.step} 
                                                        value={impactVars[dim.id] || dim.default}
                                                        onChange={(e) => setImpactVars({...impactVars, [dim.id]: parseFloat(e.target.value)})}
                                                        className="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                                                    />
                                                    <div className="flex justify-between text-[10px] text-slate-400 mt-1 font-mono">
                                                        <span>{dim.min.toFixed(1)}</span>
                                                        <span>{dim.max.toFixed(1)}</span>
                                                    </div>
                                                </div>
                                            ))}
                                            <div className="pt-2 border-t border-slate-200 flex justify-between items-center">
                                                <span className="text-xs text-slate-500">变量相乘总影响:</span>
                                                <span className="text-sm font-bold text-slate-700">{totalImpactMultiplier.toFixed(3)}x</span>
                                            </div>
                                        </div>
                                    )}

                                    {!isImpactExpanded && (
                                        <div className="mt-3 text-[13px] text-slate-500 flex justify-between items-center bg-slate-50 p-2 rounded border border-slate-100">
                                            <span>当前综合复杂度系数:</span>
                                            <span className="font-bold text-blue-600">{totalImpactMultiplier.toFixed(2)}x</span>
                                        </div>
                                    )}
                                </div>

                                {/* 3. 基础业务参数 */}
                                <div className="bg-white rounded-2xl shadow-sm border border-line p-5">
                                    <h2 className="text-sm font-semibold text-ink mb-3 flex items-center">
                                        <IconRenderer name="Database" className="w-4 h-4 mr-2 text-brand" /> 基础业务参数
                                    </h2>
                                    <div className="space-y-4">
                                        
                                        <div className={`p-3 rounded-lg border transition-colors ${selectedProductIds.includes('insight') ? 'bg-indigo-50 border-indigo-200' : 'bg-slate-50 border-slate-200 opacity-50 grayscale'}`}>
                                            <label className="block text-sm font-medium text-slate-800 mb-1 flex items-center justify-between">
                                                <span>业务对象数量 (N1)</span>
                                                <span className="text-xs bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded font-mono">业务洞察</span>
                                            </label>
                                            <div className="relative">
                                                <input 
                                                    type="number" min="1"
                                                    disabled={!selectedProductIds.includes('insight')}
                                                    value={objectCountN1}
                                                    onChange={(e) => setObjectCountN1(parseInt(e.target.value) || 1)}
                                                    className={`w-full text-sm rounded-lg block p-2 outline-none border ${selectedProductIds.includes('insight') ? 'bg-white border-indigo-300 focus:ring-2 focus:ring-indigo-500' : 'bg-slate-100 border-slate-200 text-slate-400'}`} 
                                                />
                                            </div>
                                        </div>

                                        <div className={`p-3 rounded-lg border transition-colors ${selectedProductIds.includes('sales') ? 'bg-teal-50 border-teal-200' : 'bg-slate-50 border-slate-200 opacity-50 grayscale'}`}>
                                            <label className="block text-sm font-medium text-slate-800 mb-1 flex items-center justify-between">
                                                <span>场景数量设定 (N2)</span>
                                                <span className="text-xs bg-teal-100 text-teal-700 px-1.5 py-0.5 rounded font-mono">销售记录</span>
                                            </label>
                                            <div className="relative">
                                                <input 
                                                    type="number" min="1"
                                                    disabled={!selectedProductIds.includes('sales')}
                                                    value={objectCountN2}
                                                    onChange={(e) => setObjectCountN2(parseInt(e.target.value) || 1)}
                                                    className={`w-full text-sm rounded-lg block p-2 outline-none border ${selectedProductIds.includes('sales') ? 'bg-white border-teal-300 focus:ring-2 focus:ring-teal-500' : 'bg-slate-100 border-slate-200 text-slate-400'}`} 
                                                />
                                            </div>
                                        </div>

                                        <div className="pt-3 border-t border-slate-100">
                                            <label className="block text-sm font-medium text-slate-700 mb-2">交付人天单价 (元/人天)</label>
                                            <div className="relative">
                                                <div className="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                                                    <IconRenderer name="DollarSign" className="w-4 h-4 text-slate-400" />
                                                </div>
                                                <input 
                                                    type="number" 
                                                    value={dailyRate}
                                                    onChange={(e) => setDailyRate(Number(e.target.value))}
                                                    className="bg-slate-50 border border-slate-300 text-slate-900 text-[15px] font-semibold rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full pl-9 p-2.5 outline-none shadow-inner" 
                                                />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* 右侧主矩阵与报价单 */}
                            <div className="lg:col-span-3 space-y-5">
                                <div className="bg-white rounded-2xl shadow-sm border border-line overflow-hidden">
                                    <div className="px-5 py-3 border-b border-line bg-canvas flex justify-between items-center flex-wrap gap-2">
                                        <h3 className="text-[15px] font-semibold text-ink">交付工作量明细表 <span className="text-xs font-normal text-ink-muted ml-1">(单位:人天)</span></h3>
                                        <div className="flex items-center gap-2 flex-wrap">
                                            <span className="text-xs font-medium text-brand-deep bg-orange-50 px-2.5 py-1 rounded-full border border-orange-200 inline-flex items-center gap-1">
                                                <IconRenderer name="SlidersIcon" className="w-3 h-3" />
                                                综合系数 {finalComplexity.toFixed(2)}x
                                            </span>
                                            <button
                                                onClick={toggleAllPhases}
                                                className="text-xs inline-flex items-center gap-1 text-ink-secondary hover:text-brand-deep transition-colors px-2.5 py-1 rounded-md bg-white border border-line hover:border-orange-200"
                                            >
                                                <IconRenderer name="ChevronsUpDown" className="w-3.5 h-3.5" />
                                                {config && config.phases && expandedPhases.length === config.phases.length ? '全部收起' : '全部展开'}
                                            </button>
                                            <button
                                                onClick={handleExportExcel}
                                                className="text-xs inline-flex items-center gap-1 text-white px-3 py-1 rounded-md font-medium border border-brand-deep transition-opacity hover:opacity-90"
                                                style={{ background: 'linear-gradient(135deg, #FF8D1A, #FF7A00)' }}
                                            >
                                                <IconRenderer name="Download" className="w-3.5 h-3.5" />
                                                导出 Excel
                                            </button>
                                        </div>
                                    </div>
                                    
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm text-left text-ink-secondary select-none">
                                            <thead className="text-xs text-ink-secondary bg-canvas border-b border-line">
                                                <tr>
                                                    <th scope="col" className="px-5 py-3 font-medium w-[35%]">
                                                        任务阶段与细分执行项
                                                    </th>
                                                    {selectedProducts.map(product => (
                                                        <th key={product.id} scope="col" className="px-4 py-3 font-medium text-center whitespace-nowrap min-w-[110px]">
                                                            {product.name}
                                                        </th>
                                                    ))}
                                                    <th scope="col" className="px-5 py-3 font-semibold text-ink text-right bg-orange-50 whitespace-nowrap border-l border-orange-100">
                                                        折算后小计
                                                    </th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {selectedProducts.length === 0 ? (
                                                    <tr>
                                                        <td colSpan={8} className="px-6 py-16 text-center">
                                                            <div className="flex flex-col items-center justify-center text-slate-400">
                                                                <IconRenderer name="FileSearch" className="w-12 h-12 mb-3 text-slate-300" />
                                                                <p className="text-base font-medium">请在左侧选择至少一款交付产品</p>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ) : (
                                                    matrixData.map((phase) => {
                                                        const isExpanded = expandedPhases.includes(phase.id);
                                                        return (
                                                            <React.Fragment key={phase.id}>
                                                                <tr 
                                                                    onClick={() => togglePhase(phase.id)}
                                                                    className={`cursor-pointer hover:bg-slate-100 transition-colors ${isExpanded ? 'bg-slate-50' : 'border-b border-slate-200'}`}
                                                                >
                                                                    <td className="px-6 py-3.5 font-bold text-slate-800 flex items-center">
                                                                        <span className="mr-2 text-slate-400">
                                                                            {isExpanded ? <IconRenderer name="ChevronDown" className="w-4 h-4" /> : <IconRenderer name="ChevronRight" className="w-4 h-4" />}
                                                                        </span>
                                                                        <IconRenderer name={phase.icon} className={`w-4 h-4 mr-2 ${phase.iconColor || 'text-slate-500'}`} />
                                                                        {phase.name}
                                                                    </td>
                                                                    {phase.productTotals.map((val, vIdx) => (
                                                                        <td key={vIdx} className="px-4 py-3.5 text-center font-semibold text-slate-700">
                                                                            {val.days > 0 ? val.days.toFixed(1) : '-'}
                                                                        </td>
                                                                    ))}
                                                                    <td className="px-5 py-3 text-right font-bold text-brand-deep bg-orange-50 border-l border-orange-100">
                                                                        {phase.rowTotal.toFixed(1)}
                                                                    </td>
                                                                </tr>

                                                                {isExpanded && phase.subTasks.map((sub, sIdx) => (
                                                                    <tr 
                                                                        key={sub.id} 
                                                                        className={`bg-white hover:bg-yellow-50/30 transition-colors ${sIdx === phase.subTasks.length - 1 ? 'border-b border-slate-200' : 'border-b border-slate-50'}`}
                                                                    >
                                                                        <td className="px-6 py-3 pl-14 flex flex-col justify-center relative min-h-[48px]">
                                                                            <div className="absolute left-[38px] top-0 bottom-0 w-px bg-slate-200"></div>
                                                                            <div className="absolute left-[38px] top-1/2 w-3 h-px bg-slate-200"></div>
                                                                            <span className="text-[13px] text-slate-600 leading-snug">{sub.name}</span>
                                                                            
                                                                            {sub.isDynamicApi && (
                                                                                <span className="text-[10px] text-orange-500 font-medium mt-0.5">请在对应单元格内填写接口数 (单接口按3天计)</span>
                                                                            )}
                                                                            {sub.isCapped && (
                                                                                <span className="text-[10px] text-red-500 font-medium mt-0.5">已触发封顶机制 (原计 {sub.originalRowTotal.toFixed(1)} 天 → 现计 {sub.cap} 天)</span>
                                                                            )}
                                                                        </td>
                                                                        {sub.productValues.map((val, vIdx) => (
                                                                            <td key={vIdx} className="px-4 py-3 text-center text-xs align-middle">
                                                                                {sub.isDynamicApi ? (
                                                                                    <div className="flex justify-center items-center">
                                                                                        <input 
                                                                                            type="number" min="0" max="99" placeholder="0"
                                                                                            value={apiCounts[val.productId] || ''}
                                                                                            onChange={(e) => {
                                                                                                const v = parseInt(e.target.value);
                                                                                                setApiCounts(prev => ({...prev, [val.productId]: isNaN(v) ? undefined : v}));
                                                                                            }}
                                                                                            onClick={(e) => e.stopPropagation()}
                                                                                            className="w-12 h-7 text-center font-mono border border-slate-300 rounded focus:border-orange-500 focus:ring-1 focus:ring-orange-500 outline-none text-orange-700 bg-orange-50/50"
                                                                                        />
                                                                                        <span className="text-[10px] ml-1 text-slate-400">个</span>
                                                                                    </div>
                                                                                ) : (
                                                                                    val.days > 0 ? (
                                                                                        <span className="inline-block px-1.5 py-0.5 rounded bg-slate-100/80 text-slate-600 font-medium min-w-[2.5rem]">
                                                                                            {val.days.toFixed(1)}
                                                                                        </span>
                                                                                    ) : (
                                                                                        <span className="text-slate-300">-</span>
                                                                                    )
                                                                                )}
                                                                            </td>
                                                                        ))}
                                                                        <td className={`px-6 py-3 text-right font-semibold text-xs border-l border-blue-50 align-middle ${sub.isCapped ? 'bg-red-50/30' : 'text-slate-700 bg-slate-50/30'}`}>
                                                                            {sub.isCapped ? (
                                                                                <div className="flex flex-col items-end">
                                                                                    <span className="text-slate-400 line-through decoration-slate-400 text-[10px] mb-0.5" title="原计算合计">{sub.originalRowTotal.toFixed(1)}</span>
                                                                                    <span className="text-red-600 text-sm">{sub.rowTotal.toFixed(1)}</span>
                                                                                </div>
                                                                            ) : (
                                                                                <span className="text-slate-700">{sub.rowTotal.toFixed(1)}</span>
                                                                            )}
                                                                        </td>
                                                                    </tr>
                                                                ))}
                                                            </React.Fragment>
                                                        );
                                                    })
                                                )}
                                            </tbody>
                                            {selectedProducts.length > 0 && (
                                                <tfoot className="bg-ink text-white font-semibold">
                                                    <tr>
                                                        <td className="px-5 py-4 pl-12 text-[12.5px]">
                                                            产品专列合计 (含变量)
                                                        </td>
                                                        {selectedProducts.map(product => {
                                                            const colTotal = matrixData.reduce((acc, ph) => acc + (ph.productTotals.find(p => p.productId === product.id)?.days || 0), 0);
                                                            return (
                                                                <td key={`total-${product.id}`} className="px-4 py-4 text-center text-orange-200 border-t border-white/10">
                                                                    {colTotal.toFixed(1)}
                                                                </td>
                                                            )
                                                        })}
                                                        <td className="px-5 py-4 text-right border-l border-white/10" style={{ background: 'rgba(255, 122, 0, 0.18)' }}>
                                                            <div className="text-[10.5px] text-white/60 font-normal mb-0.5">合并折算总人天</div>
                                                            <div className="text-xl text-brand font-black">{totalDays.toFixed(1)}</div>
                                                        </td>
                                                    </tr>
                                                </tfoot>
                                            )}
                                        </table>
                                    </div>
                                </div>

                                {/* 报价总结卡片 — ds 风:深灰底 + 橙 accent + 克制金额展示 */}
                                <div className="relative overflow-hidden rounded-2xl shadow-lg p-7 text-white bg-ink">
                                    {/* 背景大图标(留作装饰) */}
                                    <div className="absolute top-0 right-0 -mt-10 -mr-10 opacity-[0.06] pointer-events-none">
                                        <IconRenderer name="Calculator" className="w-64 h-64" />
                                    </div>
                                    {/* 顶部橙色装饰条 */}
                                    <div className="absolute top-0 left-0 right-0 h-1" style={{ background: 'linear-gradient(90deg, #FF8D1A, #FF7A00, #D96400)' }}></div>

                                    <div className="relative z-10 grid grid-cols-1 md:grid-cols-3 gap-6 items-center">
                                        <div className="md:col-span-2">
                                            <h3 className="text-white/60 font-medium text-xs mb-2">项目预估总报价 (RMB)</h3>
                                            <div className="text-4xl font-extrabold tracking-tight mb-3 flex items-baseline">
                                                <span className="text-2xl mr-2 font-medium text-white/70">¥</span>
                                                <span className={hasCappedTriggered ? "text-transparent bg-clip-text" : "text-brand"}
                                                      style={hasCappedTriggered ? { backgroundImage: 'linear-gradient(90deg, #FFB166, #FF7A00)' } : undefined}>
                                                    {totalPrice.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                                                </span>
                                            </div>
                                            <div className="text-white/70 text-xs leading-relaxed space-y-0.5">
                                                <p>当前包含 <strong className="text-white">{selectedProducts.length}</strong> 款 AI 产品</p>
                                                {selectedProducts.length > 0 && (
                                                    <p className="text-[11px] text-white/50">
                                                        综合系数 {finalComplexity.toFixed(2)}x
                                                        {selectedProductIds.includes('insight') ? ` · 业务洞察 N1=${objectCountN1}` : ''}
                                                        {selectedProductIds.includes('sales') ? ` · 销售记录 N2=${objectCountN2}` : ''}
                                                    </p>
                                                )}
                                            </div>

                                            {hasCappedTriggered && (
                                                <div className="mt-4 bg-white/5 border border-orange-400/30 rounded-lg p-2.5 flex items-start gap-2">
                                                    <IconRenderer name="AlertCircle" className="w-4 h-4 text-brand flex-shrink-0 mt-0.5" />
                                                    <div className="text-[11.5px] text-white/85 leading-snug">
                                                        多产品组合交付,培训及验收相关任务已触发<strong className="text-brand">合并人天封顶规则</strong>。报价已自动减免超出部分。
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        <div className="bg-white/5 rounded-xl p-4 border border-white/10">
                                            <div className="space-y-3">
                                                <div className="flex justify-between items-center pb-3 border-b border-white/10">
                                                    <span className="text-white/60 text-[11px]">总工作量</span>
                                                    <span className="font-bold text-xl text-white">{totalDays.toFixed(1)} <span className="text-xs font-normal text-white/60">天</span></span>
                                                </div>
                                                <div className="flex justify-between items-center">
                                                    <span className="text-white/60 text-[11px]">当前单价</span>
                                                    <span className="font-semibold text-base text-white">¥{dailyRate} <span className="text-[10px] font-normal text-white/60">/ 天</span></span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
