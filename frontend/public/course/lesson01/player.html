<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第 1 讲 · AI 到底是什么 · 播放</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Noto Sans SC', 'Inter', sans-serif;
    background: #0a0a0a;
    color: #e8e8e8;
    line-height: 1.6;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* 顶部导航 */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    height: 56px;
    background: rgba(10, 10, 10, 0.92);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid #1f1f1f;
    display: flex; align-items: center; padding: 0 20px; gap: 12px;
  }
  .topbar a, .topbar button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #b8b6ff;
    text-decoration: none;
    padding: 7px 12px;
    border: 1px solid rgba(120, 119, 198, 0.3);
    background: rgba(120, 119, 198, 0.08);
    border-radius: 100px;
    transition: all 0.15s;
    cursor: pointer;
  }
  .topbar a:hover, .topbar button:hover { background: rgba(120, 119, 198, 0.18); }
  .topbar-title {
    flex: 1; text-align: center;
    font-size: 13px; color: #888;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.15em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .topbar-title .pageno { color: #fff; }

  /* 主舞台 */
  .stage {
    position: fixed;
    top: 56px; bottom: 110px; left: 0; right: 0;
    overflow: auto;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 40px 20px;
  }
  .slide {
    max-width: 980px; width: 100%;
    animation: fadeIn 0.5s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  /* 互动提示气泡(音频播完后显示) */
  .interact-bubble {
    position: fixed;
    bottom: 130px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, rgba(120, 119, 198, 0.92) 0%, rgba(184, 182, 255, 0.92) 100%);
    color: #0a0a0a;
    padding: 14px 24px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 500;
    max-width: 88vw;
    box-shadow: 0 12px 32px rgba(120, 119, 198, 0.4);
    z-index: 60;
    display: none;
    animation: bubble-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-align: center;
  }
  .interact-bubble.on { display: block; }
  @keyframes bubble-in {
    from { opacity: 0; transform: translateX(-50%) translateY(20px) scale(0.9); }
    to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  }

  /* 底部播放控制 */
  .playbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 110px;
    background: linear-gradient(180deg, rgba(15, 15, 15, 0.95) 0%, rgba(10, 10, 10, 0.98) 100%);
    border-top: 1px solid #1f1f1f;
    backdrop-filter: blur(16px);
    z-index: 40;
    padding: 14px 28px 18px;
    display: flex; flex-direction: column; gap: 12px;
  }
  /* 进度条 */
  .progress {
    height: 4px; background: #1f1f1f; border-radius: 2px;
    cursor: pointer; position: relative; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #7877c6 0%, #b8b6ff 100%);
    width: 0%; transition: width 0.1s linear;
    border-radius: 2px;
  }
  .progress-time {
    position: absolute; right: 0; top: -22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #888;
  }
  /* 控件行 */
  .controls {
    display: flex; align-items: center; gap: 16px;
  }
  .controls .ctl {
    padding: 10px 20px;
    border-radius: 100px;
    border: 1px solid #2a2a2a;
    background: transparent;
    color: #d4d4d4;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .controls .ctl:hover:not(:disabled) {
    border-color: #555; color: #fff;
  }
  .controls .ctl:disabled { opacity: 0.4; cursor: not-allowed; }
  .controls .ctl.primary {
    background: linear-gradient(135deg, #7877c6 0%, #9695e8 100%);
    color: #fff; border-color: transparent;
    padding: 11px 26px;
    font-weight: 500;
  }
  .controls .ctl.primary:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px -8px rgba(120, 119, 198, 0.6);
  }
  .controls .spacer { flex: 1; }

  /* 速度选择 */
  .speed-wrap {
    display: flex; align-items: center; gap: 8px;
  }
  .speed-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: #888; letter-spacing: 0.12em;
  }
  .speed-opts {
    display: flex; gap: 4px;
    padding: 3px; background: #161616; border-radius: 100px;
    border: 1px solid #1f1f1f;
  }
  .speed-opt {
    padding: 5px 10px;
    background: transparent; border: none;
    color: #888;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .speed-opt:hover { color: #fff; }
  .speed-opt.active {
    background: linear-gradient(135deg, #7877c6 0%, #b8b6ff 100%);
    color: #0a0a0a; font-weight: 600;
  }

  /* 连续播放开关 */
  .toggle-wrap {
    display: flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: #888; letter-spacing: 0.12em;
    cursor: pointer; user-select: none;
  }
  .toggle {
    width: 38px; height: 22px;
    background: #2a2a2a;
    border-radius: 12px;
    position: relative;
    transition: background 0.2s;
  }
  .toggle.on { background: #7877c6; }
  .toggle::after {
    content: ''; position: absolute;
    top: 3px; left: 3px;
    width: 16px; height: 16px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(16px); }

  /* 页号 */
  .page-meta {
    display: flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #888;
    letter-spacing: 0.12em;
  }
  .page-meta .cur { color: #fff; font-weight: 600; }
  .page-title-row {
    font-size: 13px; color: #c0c0c0;
    text-align: center; flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ===== Visual 模板样式 ===== */
  /* hero */
  .v-hero { text-align: center; }
  .v-hero .tag {
    display: inline-block; padding: 6px 16px;
    background: rgba(120, 119, 198, 0.12);
    border: 1px solid rgba(120, 119, 198, 0.35);
    color: #b8b6ff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.2em;
    border-radius: 100px;
    margin-bottom: 36px;
  }
  .v-hero h1 {
    font-family: 'Inter', sans-serif;
    font-size: 96px; font-weight: 800;
    line-height: 1; letter-spacing: -0.03em;
    margin-bottom: 18px;
    background: linear-gradient(135deg, #fff 0%, #b8b6ff 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .v-hero .sub { font-size: 28px; color: #aaa; margin-bottom: 24px; font-weight: 300; }
  .v-hero .note { font-size: 14px; color: #666; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em; }

  /* course-map */
  .v-cmap { padding: 20px 0; }
  .v-cmap h2 { font-size: 24px; color: #fff; margin-bottom: 28px; text-align: center; font-weight: 600; }
  .v-cmap .row {
    display: flex; align-items: center;
    padding: 16px 24px;
    border-radius: 8px;
    margin-bottom: 10px;
    background: #131313;
    border-left: 4px solid #2a2a2a;
    transition: all 0.25s;
  }
  .v-cmap .row.hl {
    background: linear-gradient(90deg, rgba(217, 179, 102, 0.1), transparent);
    border-left-color: var(--c);
    transform: translateX(4px);
  }
  .v-cmap .n {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--c); flex: 1;
    letter-spacing: 0.15em; font-weight: 500;
  }
  .v-cmap .rng {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #888;
  }

  /* quote */
  .v-quote { text-align: center; padding: 30px 0; }
  .v-quote .main {
    font-size: 56px; font-weight: 700;
    color: #fff; line-height: 1.2;
    margin-bottom: 26px; letter-spacing: -0.02em;
  }
  .v-quote .sub {
    font-size: 19px; color: #888;
    max-width: 720px; margin: 0 auto;
    line-height: 1.7;
  }

  /* thesis */
  .v-thesis { text-align: center; padding: 40px 0; }
  .v-thesis .label {
    color: #b8b6ff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: 0.25em;
    margin-bottom: 32px;
  }
  .v-thesis .quote {
    font-size: 56px; font-weight: 700;
    color: #fff; line-height: 1.35;
    margin-bottom: 36px;
    background: linear-gradient(135deg, #fff 0%, #b8b6ff 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .v-thesis .footer { color: #888; font-size: 15px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em; }

  /* question */
  .v-q { padding: 30px 0; text-align: center; }
  .v-q .q {
    font-size: 44px; font-weight: 700; color: #fff;
    margin-bottom: 36px; line-height: 1.3;
  }
  .v-q .opts {
    display: flex; flex-direction: column; gap: 12px;
    max-width: 560px; margin: 0 auto 24px;
  }
  .v-q .opt {
    padding: 16px 22px;
    background: #131313; border: 1px solid #1f1f1f;
    border-radius: 6px; color: #d4d4d4;
    font-size: 16px;
  }
  .v-q .tail {
    color: #b8b6ff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; letter-spacing: 0.1em; margin-top: 20px;
  }

  /* rules */
  .v-rules { max-width: 540px; margin: 0 auto; padding: 20px 0; }
  .v-rules h2 {
    text-align: center; font-size: 32px; font-weight: 700;
    color: #fff; margin-bottom: 32px;
  }
  .v-rules .rule {
    padding: 14px 22px;
    background: #131313;
    border-left: 3px solid #00d4ff;
    margin-bottom: 8px;
    font-size: 17px;
    font-family: 'JetBrains Mono', monospace;
    color: #e8e8e8;
  }
  .v-rules .verdict {
    margin-top: 24px;
    padding: 20px 24px;
    background: rgba(0, 212, 255, 0.08);
    border: 1px solid rgba(0, 212, 255, 0.3);
    border-radius: 8px;
    text-align: center;
    font-size: 19px;
    color: #00d4ff;
    font-weight: 600;
  }

  /* compare-rules */
  .v-cmp { padding: 20px 0; }
  .v-cmp h2 { text-align: center; font-size: 26px; color: #fff; margin-bottom: 24px; font-weight: 600; }
  .v-cmp .row {
    display: grid; grid-template-columns: 180px 1fr 100px;
    align-items: center;
    padding: 16px 24px; margin-bottom: 8px;
    background: #131313;
    border-left: 4px solid;
    border-radius: 6px;
  }
  .v-cmp .row.ok { border-left-color: #00e676; }
  .v-cmp .row.bad { border-left-color: #ff7a7a; background: rgba(255, 122, 122, 0.06); }
  .v-cmp .input { font-weight: 600; font-size: 18px; color: #fff; }
  .v-cmp .verdict { color: #d4d4d4; font-size: 15px; }
  .v-cmp .tag {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .v-cmp .row.ok .tag { color: #00e676; }
  .v-cmp .row.bad .tag { color: #ff7a7a; }
  .v-cmp .lesson {
    margin-top: 24px;
    text-align: center;
    padding: 22px;
    background: rgba(255, 122, 122, 0.06);
    border: 1px solid rgba(255, 122, 122, 0.3);
    border-radius: 8px;
    font-size: 18px;
    color: #ff7a7a;
    font-weight: 600;
  }

  /* sliders */
  .v-sld { padding: 20px 0; }
  .v-sld h2 { text-align: center; font-size: 30px; color: #fff; font-weight: 700; margin-bottom: 6px; }
  .v-sld .subtitle { text-align: center; color: #888; margin-bottom: 32px; font-size: 14px; }
  .v-sld .feat {
    display: grid; grid-template-columns: 120px 1fr 60px;
    align-items: center; gap: 18px;
    padding: 12px 0;
  }
  .v-sld .feat .name { font-size: 15px; color: #d4d4d4; }
  .v-sld .feat .bar {
    height: 8px; background: #1f1f1f; border-radius: 4px; overflow: hidden;
  }
  .v-sld .feat .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #7877c6, #b8b6ff);
    border-radius: 4px;
  }
  .v-sld .feat .val { text-align: right; color: #b8b6ff; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  .v-sld .score-box {
    margin-top: 28px; padding: 28px;
    background: linear-gradient(135deg, rgba(0, 230, 118, 0.1), rgba(120, 119, 198, 0.1));
    border-radius: 12px;
    text-align: center;
  }
  .v-sld .score {
    font-size: 72px; font-weight: 800;
    background: linear-gradient(135deg, #00e676, #b8b6ff);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  .v-sld .score-label { color: #aaa; margin-top: 8px; font-size: 15px; }

  /* three-points */
  .v-3p { padding: 30px 0; max-width: 760px; margin: 0 auto; }
  .v-3p .pt {
    display: flex; gap: 24px; align-items: flex-start;
    padding: 22px 0;
    border-bottom: 1px solid #1a1a1a;
  }
  .v-3p .pt:last-child { border-bottom: none; }
  .v-3p .n {
    font-family: 'Inter', sans-serif;
    font-size: 36px; font-weight: 800;
    color: #b8b6ff; line-height: 1; flex-shrink: 0;
    width: 60px;
  }
  .v-3p .head {
    font-size: 22px; font-weight: 600; color: #fff; margin-bottom: 6px;
  }
  .v-3p .body { color: #c0c0c0; font-size: 16px; }

  /* quote-big */
  .v-qb { text-align: center; padding: 40px 0; max-width: 800px; margin: 0 auto; }
  .v-qb .before { font-size: 18px; color: #888; margin-bottom: 28px; }
  .v-qb .quote {
    font-size: 60px; font-weight: 800; line-height: 1.2;
    margin-bottom: 28px;
    background: linear-gradient(135deg, #fff 0%, #b8b6ff 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .v-qb .after { color: #aaa; font-size: 17px; line-height: 1.7; }

  /* school */
  .v-sch { padding: 20px 0; max-width: 720px; margin: 0 auto; }
  .v-sch .head {
    display: flex; align-items: baseline; gap: 18px;
    padding-bottom: 18px;
    border-bottom: 2px solid var(--c);
    margin-bottom: 26px;
  }
  .v-sch .n {
    font-family: 'JetBrains Mono', monospace;
    color: var(--c); font-size: 16px; letter-spacing: 0.2em;
  }
  .v-sch .name {
    font-size: 44px; font-weight: 700; color: #fff;
  }
  .v-sch .en {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    color: #888; font-size: 16px;
  }
  .v-sch .row {
    display: grid; grid-template-columns: 120px 1fr; gap: 24px;
    padding: 14px 0;
    border-bottom: 1px solid #1a1a1a;
  }
  .v-sch .row:last-child { border-bottom: none; }
  .v-sch .lab {
    color: var(--c);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.2em;
    padding-top: 4px;
  }
  .v-sch .val { font-size: 17px; color: #e8e8e8; line-height: 1.6; }

  /* fusion */
  .v-fus { padding: 20px 0; text-align: center; }
  .v-fus .main {
    font-size: 56px; font-weight: 800; color: #fff;
    margin-bottom: 12px;
  }
  .v-fus .eq { font-size: 36px; color: #b8b6ff; margin-bottom: 28px; }
  .v-fus .grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    max-width: 900px; margin: 0 auto;
  }
  .v-fus .part {
    padding: 24px;
    background: #131313;
    border-top: 4px solid var(--c);
    border-radius: 8px;
    text-align: center;
  }
  .v-fus .n {
    color: var(--c);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.25em;
    margin-bottom: 12px;
  }
  .v-fus .nm { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 10px; }
  .v-fus .dt { font-size: 13px; color: #aaa; line-height: 1.6; }

  /* formula */
  .v-form { padding: 30px 0; text-align: center; max-width: 720px; margin: 0 auto; }
  .v-form .label {
    color: #b8b6ff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: 0.25em;
    margin-bottom: 24px;
  }
  .v-form .formula {
    font-family: 'JetBrains Mono', monospace;
    font-size: 56px; font-weight: 500;
    color: #fff; margin-bottom: 36px;
    padding: 24px;
    background: rgba(120, 119, 198, 0.06);
    border-radius: 12px;
    border: 1px solid rgba(120, 119, 198, 0.2);
  }
  .v-form .examples {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 14px;
    margin-bottom: 28px;
  }
  .v-form .ex {
    padding: 10px 18px;
    background: #131313;
    border-radius: 100px;
    border: 1px solid #1f1f1f;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #d4d4d4;
  }
  .v-form .ex strong { color: #b8b6ff; }
  .v-form .scale { font-size: 14px; color: #888; line-height: 1.7; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em; }

  /* three-questions */
  .v-3q { padding: 30px 0; max-width: 720px; margin: 0 auto; }
  .v-3q .intro {
    text-align: center; font-size: 18px; color: #aaa;
    margin-bottom: 32px;
  }
  .v-3q .q {
    padding: 20px 26px;
    background: #131313;
    border-radius: 8px;
    margin-bottom: 12px;
    border-left: 3px solid #b8b6ff;
    font-size: 18px;
    color: #fff;
    font-weight: 500;
  }
  .v-3q .tail {
    margin-top: 32px;
    text-align: center;
    padding: 22px;
    background: rgba(120, 119, 198, 0.1);
    border-radius: 8px;
    color: #b8b6ff;
    font-size: 16px;
    font-weight: 500;
  }

  /* recap */
  .v-rec { padding: 30px 0; max-width: 720px; margin: 0 auto; }
  .v-rec h2 {
    font-size: 36px; font-weight: 700; color: #fff;
    margin-bottom: 28px; text-align: center;
  }
  .v-rec .pt {
    padding: 16px 22px;
    background: #131313;
    border-radius: 6px;
    margin-bottom: 8px;
    font-size: 17px;
    color: #d4d4d4;
    border-left: 3px solid #00e676;
  }
  .v-rec .next {
    margin-top: 32px;
    padding: 24px;
    background: linear-gradient(135deg, rgba(120, 119, 198, 0.1), rgba(184, 182, 255, 0.05));
    border-radius: 12px;
    text-align: center;
    font-size: 16px;
    color: #b8b6ff;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.1em;
  }

  /* 移动端 */
  @media (max-width: 720px) {
    .stage { padding: 24px 18px; }
    .v-hero h1 { font-size: 56px; }
    .v-hero .sub { font-size: 20px; }
    .v-thesis .quote { font-size: 34px; }
    .v-q .q { font-size: 28px; }
    .v-cmp .row { grid-template-columns: 100px 1fr 60px; padding: 12px 14px; }
    .v-cmp .input { font-size: 14px; }
    .v-fus .grid { grid-template-columns: 1fr; }
    .v-form .formula { font-size: 28px; padding: 16px; }
    .v-qb .quote { font-size: 34px; }
    .v-sch .name { font-size: 28px; }
    .v-sch .row { grid-template-columns: 80px 1fr; gap: 12px; }
    .playbar { height: 130px; padding: 12px 16px 14px; }
    .controls { gap: 8px; flex-wrap: wrap; }
    .controls .ctl { padding: 8px 12px; font-size: 11px; }
    .controls .ctl.primary { padding: 9px 16px; }
    .toggle-wrap { font-size: 10px; }
    .topbar { height: 48px; padding: 0 14px; gap: 8px; }
    .topbar-title { display: none; }
    .stage { top: 48px; bottom: 130px; }
    .interact-bubble { bottom: 145px; font-size: 13px; padding: 10px 18px; }
  }
</style>
</head>
<body>

<nav class="topbar">
  <a href="index.html">← 总览</a>
  <a href="demo.html?v=20260511" target="_blank" rel="noopener">完整演示 ↗</a>
  <div class="topbar-title">第 1 讲 · <span class="pageno" id="topPageNo">1</span> / <span id="topTotal">17</span></div>
  <a href="script.html?lesson=01" target="_blank" rel="noopener">讲稿</a>
</nav>

<main class="stage" id="stage">
  <div class="slide" id="slide">加载中…</div>
</main>

<div class="interact-bubble" id="bubble">
  音频播放完了 · 可以点击网页继续互动,或者点「下一页 →」
</div>

<div class="playbar">
  <div class="progress" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
    <div class="progress-time" id="timeText">0:00 / 0:00</div>
  </div>
  <div class="controls">
    <div class="page-meta">
      <span class="cur" id="curPage">1</span>
      <span>/</span>
      <span id="totalPage">17</span>
    </div>
    <div class="page-title-row" id="pageTitleRow">—</div>
    <div class="spacer"></div>
    <button class="ctl" id="btnPrev">← 上一页</button>
    <button class="ctl primary" id="btnPlay">▶ 播放</button>
    <button class="ctl" id="btnNext">下一页 →</button>
    <div class="speed-wrap" title="播放速度">
      <span class="speed-label">速度</span>
      <div class="speed-opts" id="speedOpts">
        <button class="speed-opt" data-rate="0.75">0.75</button>
        <button class="speed-opt" data-rate="1">1.0</button>
        <button class="speed-opt" data-rate="1.25">1.25</button>
        <button class="speed-opt active" data-rate="1.5">1.5</button>
        <button class="speed-opt" data-rate="1.75">1.75</button>
        <button class="speed-opt" data-rate="2">2.0</button>
      </div>
    </div>
    <label class="toggle-wrap" id="toggleAuto">
      <div class="toggle" id="toggleDot"></div>
      <span>连续播放</span>
    </label>
  </div>
</div>

<audio id="audio" preload="auto"></audio>

<script>
(function () {
  'use strict';

  const state = {
    pages: [],
    idx: 0,
    autoNext: false,
    rate: 1.5,
    hasInteracted: false  // 浏览器要求首次播放必须用户交互
  };

  const audio = document.getElementById('audio');
  const slide = document.getElementById('slide');
  const bubble = document.getElementById('bubble');
  const btnPlay = document.getElementById('btnPlay');
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  const progressFill = document.getElementById('progressFill');
  const progressBar = document.getElementById('progressBar');
  const timeText = document.getElementById('timeText');
  const curPage = document.getElementById('curPage');
  const totalPage = document.getElementById('totalPage');
  const topPageNo = document.getElementById('topPageNo');
  const topTotal = document.getElementById('topTotal');
  const toggleAuto = document.getElementById('toggleAuto');
  const toggleDot = document.getElementById('toggleDot');
  const pageTitleRow = document.getElementById('pageTitleRow');

  // ===== Visual 渲染 =====
  function renderSlide(p) {
    const v = p.visual || {};
    const t = v.type;
    let html = '';
    if (t === 'hero') {
      html = `
        <div class="v-hero">
          <div class="tag">${esc(v.tag || '')}</div>
          <h1>${esc(v.h1 || '')}</h1>
          <div class="sub">${esc(v.subtitle || '')}</div>
          <div class="note">${esc(v.note || '')}</div>
        </div>`;
    } else if (t === 'course-map') {
      html = `
        <div class="v-cmap">
          <h2>${esc(p.title)} · 23 讲全景</h2>
          ${v.parts.map((part, i) => `
            <div class="row ${i === v.highlight ? 'hl' : ''}" style="--c: ${part.color}">
              <div class="n">${esc(part.name)}</div>
              <div class="rng">${esc(part.range)}</div>
            </div>`).join('')}
        </div>`;
    } else if (t === 'quote') {
      html = `
        <div class="v-quote">
          <div class="main">${esc(v.main)}</div>
          <div class="sub">${esc(v.sub)}</div>
        </div>`;
    } else if (t === 'thesis') {
      html = `
        <div class="v-thesis">
          <div class="label">${esc(v.label)}</div>
          <div class="quote">${v.quote}</div>
          <div class="footer">${esc(v.footer)}</div>
        </div>`;
    } else if (t === 'question') {
      html = `
        <div class="v-q">
          <div class="q">${esc(v.q)}</div>
          <div class="opts">
            ${v.options.map(o => `<div class="opt">${esc(o)}</div>`).join('')}
          </div>
          <div class="tail">${esc(v.tail)}</div>
        </div>`;
    } else if (t === 'rules') {
      html = `
        <div class="v-rules">
          <h2>${esc(v.title)}</h2>
          ${v.rules.map(r => `<div class="rule">${esc(r)}</div>`).join('')}
          <div class="verdict">${esc(v.verdict)}</div>
        </div>`;
    } else if (t === 'compare-rules') {
      html = `
        <div class="v-cmp">
          <h2>挨个试一下</h2>
          ${v.cases.map(c => `
            <div class="row ${c.ok ? 'ok' : 'bad'}">
              <div class="input">${esc(c.input)}</div>
              <div class="verdict">${esc(c.verdict)}</div>
              <div class="tag">${c.ok ? '✓ 正确' : '✗ 错'}</div>
            </div>`).join('')}
          <div class="lesson">${esc(v.lesson)}</div>
        </div>`;
    } else if (t === 'sliders') {
      html = `
        <div class="v-sld">
          <h2>${esc(v.title)}</h2>
          <div class="subtitle">${esc(v.subtitle)}</div>
          ${v.features.map(f => `
            <div class="feat">
              <div class="name">${esc(f.name)}</div>
              <div class="bar"><div class="bar-fill" style="width:${f.value}%"></div></div>
              <div class="val">${f.value}</div>
            </div>`).join('')}
          <div class="score-box">
            <div class="score">${v.score}</div>
            <div class="score-label">${esc(v.verdict)}</div>
          </div>
        </div>`;
    } else if (t === 'three-points') {
      html = `
        <div class="v-3p">
          ${v.points.map(pt => `
            <div class="pt">
              <div class="n">${esc(pt.n)}</div>
              <div>
                <div class="head">${esc(pt.head)}</div>
                <div class="body">${esc(pt.body)}</div>
              </div>
            </div>`).join('')}
        </div>`;
    } else if (t === 'quote-big') {
      html = `
        <div class="v-qb">
          <div class="before">${esc(v.before)}</div>
          <div class="quote">${esc(v.quote)}</div>
          <div class="after">${esc(v.after)}</div>
        </div>`;
    } else if (t === 'school') {
      html = `
        <div class="v-sch" style="--c: ${v.color}">
          <div class="head">
            <div class="n">${esc(v.n)}</div>
            <div class="name">${esc(v.name)}</div>
            <div class="en">${esc(v.en)}</div>
          </div>
          <div class="row"><div class="lab">核心信念</div><div class="val">${esc(v.belief)}</div></div>
          <div class="row"><div class="lab">代表</div><div class="val">${esc(v.rep)}</div></div>
          <div class="row"><div class="lab">困境</div><div class="val">${esc(v.trouble)}</div></div>
          <div class="row"><div class="lab">在今天</div><div class="val">${esc(v.today)}</div></div>
        </div>`;
    } else if (t === 'fusion') {
      html = `
        <div class="v-fus">
          <div class="main">${esc(v.main)}</div>
          <div class="eq">${esc(v.eq)}</div>
          <div class="grid">
            ${v.parts.map(part => `
              <div class="part" style="--c: ${part.color}">
                <div class="n">${esc(part.n)}</div>
                <div class="nm">${esc(part.name)}</div>
                <div class="dt">${esc(part.detail)}</div>
              </div>`).join('')}
          </div>
        </div>`;
    } else if (t === 'formula') {
      html = `
        <div class="v-form">
          <div class="label">${esc(v.label)}</div>
          <div class="formula">${esc(v.formula)}</div>
          <div class="examples">
            ${v.examples.map(e => `<div class="ex"><strong>${esc(e.from)}</strong> → ${esc(e.to)}</div>`).join('')}
          </div>
          <div class="scale">${esc(v.scale)}</div>
        </div>`;
    } else if (t === 'three-questions') {
      html = `
        <div class="v-3q">
          <div class="intro">${esc(v.intro)}</div>
          ${v.questions.map(q => `<div class="q">${esc(q)}</div>`).join('')}
          <div class="tail">${esc(v.tail)}</div>
        </div>`;
    } else if (t === 'recap') {
      html = `
        <div class="v-rec">
          <h2>${esc(v.title)}</h2>
          ${v.points.map(pt => `<div class="pt">${esc(pt)}</div>`).join('')}
          <div class="next">${esc(v.next)}</div>
        </div>`;
    } else {
      html = `<div style="color:#888">未知 visual type: ${esc(t)}</div>`;
    }
    slide.innerHTML = html;
  }

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  }

  // ===== 加载 + 切页 =====
  function loadPage(idx, autoplay) {
    if (idx < 0 || idx >= state.pages.length) return;
    state.idx = idx;
    const p = state.pages[idx];
    renderSlide(p);
    audio.pause();
    audio.currentTime = 0;
    audio.src = `audio/${p.id}.wav`;
    audio.playbackRate = state.rate;
    progressFill.style.width = '0%';
    bubble.classList.remove('on');
    if (p.interact) bubble.textContent = '音频播完 · ' + p.interact;

    // 更新 UI
    curPage.textContent = idx + 1;
    topPageNo.textContent = idx + 1;
    pageTitleRow.textContent = p.title || '';
    btnPrev.disabled = idx === 0;
    btnNext.disabled = idx === state.pages.length - 1;
    btnPlay.textContent = '▶ 播放';

    if (autoplay && state.hasInteracted) {
      audio.play().catch(() => {});
    }
  }

  function fmt(s) {
    if (!isFinite(s)) return '0:00';
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return `${m}:${String(sec).padStart(2, '0')}`;
  }

  // ===== 事件 =====
  audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
      progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      timeText.textContent = `${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
    }
  });
  audio.addEventListener('play', () => { btnPlay.textContent = '❚❚ 暂停'; });
  audio.addEventListener('pause', () => { btnPlay.textContent = '▶ 播放'; });
  audio.addEventListener('ended', () => {
    progressFill.style.width = '100%';
    btnPlay.textContent = '↻ 重播';
    // 显示互动气泡
    bubble.classList.add('on');
    // 连续播放
    if (state.autoNext && state.idx < state.pages.length - 1) {
      setTimeout(() => {
        bubble.classList.remove('on');
        loadPage(state.idx + 1, true);
      }, 1800);
    }
  });

  btnPlay.addEventListener('click', () => {
    state.hasInteracted = true;
    if (audio.paused) {
      audio.play();
      bubble.classList.remove('on');
    } else {
      audio.pause();
    }
  });
  btnPrev.addEventListener('click', () => {
    state.hasInteracted = true;
    loadPage(state.idx - 1, true);
  });
  btnNext.addEventListener('click', () => {
    state.hasInteracted = true;
    bubble.classList.remove('on');
    loadPage(state.idx + 1, true);
  });
  toggleAuto.addEventListener('click', () => {
    state.autoNext = !state.autoNext;
    toggleDot.classList.toggle('on', state.autoNext);
    localStorage.setItem('player-auto', state.autoNext ? '1' : '0');
  });
  document.getElementById('speedOpts').addEventListener('click', e => {
    const btn = e.target.closest('.speed-opt');
    if (!btn) return;
    const rate = parseFloat(btn.dataset.rate);
    state.rate = rate;
    audio.playbackRate = rate;
    document.querySelectorAll('.speed-opt').forEach(b => b.classList.toggle('active', b === btn));
    localStorage.setItem('player-rate', String(rate));
  });
  progressBar.addEventListener('click', e => {
    if (!audio.duration) return;
    const rect = progressBar.getBoundingClientRect();
    const r = (e.clientX - rect.left) / rect.width;
    audio.currentTime = audio.duration * r;
  });

  // 键盘:← → 切页, space 播放/暂停
  document.addEventListener('keydown', e => {
    if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
    if (e.code === 'ArrowLeft') { btnPrev.click(); e.preventDefault(); }
    else if (e.code === 'ArrowRight') { btnNext.click(); e.preventDefault(); }
    else if (e.code === 'Space') { btnPlay.click(); e.preventDefault(); }
  });

  // 初始化
  fetch('pages.json?v=20260511')
    .then(r => r.json())
    .then(data => {
      state.pages = data.pages || [];
      totalPage.textContent = state.pages.length;
      topTotal.textContent = state.pages.length;
      // 恢复连续播放偏好
      const a = localStorage.getItem('player-auto');
      if (a === '1') { state.autoNext = true; toggleDot.classList.add('on'); }
      // 恢复速度偏好(默认 1.5)
      const savedRate = parseFloat(localStorage.getItem('player-rate') || '1.5');
      if (savedRate && !isNaN(savedRate)) {
        state.rate = savedRate;
        document.querySelectorAll('.speed-opt').forEach(b => {
          b.classList.toggle('active', parseFloat(b.dataset.rate) === savedRate);
        });
      }
      loadPage(0, false);
    })
    .catch(e => {
      slide.innerHTML = `<div style="text-align:center;color:#ff7a7a;padding:60px 20px">
        加载 pages.json 失败:${esc(String(e))}
      </div>`;
    });
})();
</script>

</body>
</html>
