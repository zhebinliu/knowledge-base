# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# nginx.uat.conf — frontend-uat 容器(只对 docker 内网暴露 :80)
# 角色:
#   1. 服务自己的 dist(/usr/share/nginx/html)— 新 UI 迭代用,Liquid Glass 重构
#   2. 接受来自 frontend-prod 容器的 proxy_pass,处理 SPA fallback
#   3. 根 `/` 302 到 `/console`(进入新工作台)
#   4. /api/* 透传到 backend(防止 prod 反代漏掉时本地仍能直连)
# 不做 TLS — 由 frontend-prod 终止 TLS 后 plain HTTP 转发进来
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    client_max_body_size 100m;

    # 健康检查 — docker healthcheck 用
    location = /health { access_log off; return 200 'ok'; default_type text/plain; }

    # 维护标志:跟 prod 共用同一个文件路径(host volume 挂进来)
    location = /maintenance.html { try_files /maintenance.html =404; }
    set $maintenance "";
    if (-f /var/run/kb-deploy/.maintenance) { set $maintenance "on"; }

    # /api(无 trailing slash)渲染 SPA 的 ApiDocs 页面
    location = /api { try_files /index.html =404; }

    # /ds.md — markdown 文件以 text/markdown 直出
    location = /ds.md {
        types { }
        default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "public, max-age=300" always;
        try_files /ds.md =404;
    }
    # /llms.txt — LLM 信息文件
    location = /llms.txt {
        types { }
        default_type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=300" always;
        try_files /llms.txt =404;
    }

    # /course 301 + /course/*.md markdown content-type
    location = /course { return 301 /course/; }
    location ~ ^/course/.*\.md$ {
        types { }
        default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # /api/* → backend(完全复用现有后端 + 数据)
    # frontend-prod 反代正常情况下会先匹配 /api/* 自己代到 backend,
    # 这里只是 fallback / 直连场景的保险
    location ~ ^/(api|health)(/|$) {
        if ($maintenance = "on") { return 503; }
        proxy_pass            http://backend:8000;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_read_timeout    180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_buffering       off;
        proxy_request_buffering off;
    }

    # 根 `/` 进新工作台(App.tsx 检测 hostname=uat 自动用新 UI;反代后 $host=uat.tokenwave.cloud)
    location = / {
        if ($maintenance = "on") { return 503; }
        return 302 /console;
    }

    # SPA fallback
    location / {
        if ($maintenance = "on") { return 503; }
        try_files $uri $uri/ /index.html;
    }

    # index.html 永远不缓存 — 每次部署后用户立刻看到新 dist 引用的 hashed 资源
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # version.json 永远不缓存 — VersionWatcher 每 60s poll 它检测新版本
    location = /version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        default_type application/json;
    }

    # hashed 资源永久缓存(文件名变了浏览器自然换)
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    error_page 503 = @maintenance_503;
    location @maintenance_503 {
        internal;
        add_header Cache-Control "no-store" always;
        add_header Retry-After 30 always;
        try_files /maintenance.html =503;
    }
}
