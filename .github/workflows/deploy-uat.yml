name: Deploy UAT

# UAT 部署:
#   - 推送 main 自动触发(快速迭代)
#   - 只构建 / 推送 / 重启 frontend-uat 容器
#   - 不影响生产 kb.liii.in / kb.tokenwave.cloud(共用 frontend 容器不动)
#   - 不重启 backend(共享后端,改后端需要走 deploy-prod)
on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'LEARNING.md'
      - 'PROJECT_OVERVIEW.md'
      - 'CLAUDE.md'
      - 'CHANGELOG.md'
      - 'task.md'
      - 'backend/services/agentic/skills_roadmap.md'
      - '.gitignore'
      - 'desktop/**'
      - '.github/workflows/desktop-build.yml'
      - '.github/workflows/deploy-prod.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FRONTEND_UAT_IMAGE: ${{ github.repository }}-frontend-uat
  DOCKER_BUILDKIT: 1

jobs:
  frontend-check:
    name: Frontend tsc + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # meeting 模块在 meeting/ 子目录,非 Docker 的 CI job 需手动 overlay
      - name: Overlay meeting/
        run: |
          cp -r meeting/backend/. backend/
          cp -r meeting/frontend/. frontend/
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci --legacy-peer-deps
      - name: Type check
        run: cd frontend && npx tsc --noEmit -p tsconfig.json
      - name: Build
        run: cd frontend && npm run build

  build-and-push:
    name: Build & push frontend-uat image
    needs: frontend-check
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_UAT_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Build and push frontend-uat
        uses: docker/build-push-action@v5
        with:
          # context 改为仓库根(meeting/ overlay 需要),Dockerfile 显式指定
          context: .
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            ENV=uat
            GIT_SHA=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend-uat
          cache-to: type=gha,mode=max,scope=frontend-uat

  deploy:
    name: Deploy frontend-uat to server
    needs: build-and-push
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Compute short SHA
        id: sha
        run: echo "value=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            # git pull 仅做 best-effort 同步,失败不阻断(部署只靠 image,不依赖 host 源码)
            git pull origin main 2>&1 | tail -5 || echo "git pull failed (likely local uncommitted changes), continuing with docker images only"

            SHORT_SHA="${{ steps.sha.outputs.value }}"
            FRONTEND_UAT_IMAGE_FULL="${{ env.REGISTRY }}/${{ env.FRONTEND_UAT_IMAGE }}:sha-${SHORT_SHA}"
            echo "→ target image: ${FRONTEND_UAT_IMAGE_FULL}"

            # sudo 默认清环境变量 — 用 sudo VAR=val 显式透传,否则 docker-compose.yml 里
            # ${FRONTEND_UAT_IMAGE:-kb-frontend-uat:latest} 会 fall back 到本地 :latest tag
            echo "→ pulling frontend-uat sha-${SHORT_SHA}"
            sudo FRONTEND_UAT_IMAGE="${FRONTEND_UAT_IMAGE_FULL}" docker compose pull frontend-uat

            echo "→ recreating frontend-uat (frontend / backend / celery_worker 不动)"
            sudo FRONTEND_UAT_IMAGE="${FRONTEND_UAT_IMAGE_FULL}" docker compose up -d --no-deps frontend-uat

            # 验证容器真的换成了目标 image(防止 pull / up 静默失败用了旧 image)
            sleep 3
            RUNNING_IMAGE=$(sudo docker inspect kb-system-frontend-uat-1 --format '{{.Config.Image}}' 2>/dev/null || echo "")
            if [ "$RUNNING_IMAGE" != "$FRONTEND_UAT_IMAGE_FULL" ]; then
              echo "❌ 容器 image 错误: 预期 $FRONTEND_UAT_IMAGE_FULL 实际 $RUNNING_IMAGE"
              sudo docker compose ps frontend-uat
              exit 1
            fi
            echo "✓ 容器 image 已对齐:${RUNNING_IMAGE}"

            # 等 30s 验证健康(uat 容器 :80 内部端口)
            HEALTHY=false
            for i in $(seq 1 6); do
              if sudo docker exec kb-system-frontend-uat-1 wget -qO- http://127.0.0.1/health 2>/dev/null | grep -q ok; then
                HEALTHY=true
                echo "✅ frontend-uat healthy after $((i*5))s"
                break
              fi
              sleep 5
            done

            if [ "$HEALTHY" = "true" ]; then
              echo "$SHORT_SHA" > .last-good-uat-sha
              # 2026-06-09 修 fallback tag 老代码事故:把 kb-frontend-uat:latest
              # 这个 docker-compose.yml fallback tag 也 retag 到当前 sha image。
              # 这样将来任何人手动 `docker compose up` 不带 FRONTEND_UAT_IMAGE env,
              # 也不会拉到本地早期 build 的过期 :latest tag。
              sudo docker tag "$FRONTEND_UAT_IMAGE_FULL" kb-frontend-uat:latest || true
              echo "✅ UAT deployed sha-${SHORT_SHA}"
            else
              echo "❌ UAT health check failed,容器日志:"
              sudo docker compose logs --tail 50 frontend-uat || true
              exit 1
            fi

            sudo docker compose ps frontend-uat

      - name: Notify on failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          SHORT_SHA: ${{ steps.sha.outputs.value }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL 未配置,跳过通知"
            exit 0
          fi
          curl -sS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"❌ KB UAT 部署失败 sha=${SHORT_SHA} ${COMMIT_MSG}\"}}" \
          || echo "webhook 通知失败"
