name: CI Checks

# 纯 CI 文件 — 只跑 frontend tsc/build + backend tests,不部署
# 部署逻辑拆到:
#   - .github/workflows/deploy-uat.yml  (push main 自动)
#   - .github/workflows/deploy-prod.yml (workflow_dispatch 手动)
# PR / 非 main 分支推送也走这里,验证后再合 main
on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'LEARNING.md'
      - 'PROJECT_OVERVIEW.md'
      - 'CLAUDE.md'
      - 'CHANGELOG.md'
      - 'task.md'
      - 'backend/services/agentic/skills_roadmap.md'
      - '.gitignore'
      - 'desktop/**'
      - 'edge/**'
      - '.github/workflows/desktop-build.yml'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'LEARNING.md'
      - 'PROJECT_OVERVIEW.md'
      - 'CLAUDE.md'
      - 'CHANGELOG.md'
      - 'task.md'
      - 'backend/services/agentic/skills_roadmap.md'
      - '.gitignore'
      - 'desktop/**'
      - 'edge/**'
      - '.github/workflows/desktop-build.yml'

jobs:
  frontend-check:
    name: Frontend tsc + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # meeting 模块在仓库根的 meeting/ 子目录,非 Docker 的 CI job 需手动 overlay
      # 把 meeting/backend|frontend/ 的文件 cp 回 backend/ frontend/ 原位置
      - name: Overlay meeting/
        run: |
          cp -r meeting/backend/. backend/
          cp -r meeting/frontend/. frontend/
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci --legacy-peer-deps
      - name: Type check
        run: cd frontend && npx tsc --noEmit -p tsconfig.json
      - name: Build
        run: cd frontend && npm run build

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kb_system
          POSTGRES_USER: kb_admin
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # meeting/ overlay —— 见 frontend-check job 注释
      - name: Overlay meeting/
        run: |
          cp -r meeting/backend/. backend/
          cp -r meeting/frontend/. frontend/

      - name: Start MinIO manually
        run: |
          docker run -d -p 9000:9000 -p 9001:9001 --name minio \
            -e "MINIO_ROOT_USER=minioadmin" \
            -e "MINIO_ROOT_PASSWORD=minioadmin" \
            minio/minio server /data

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio

      - name: Set up Environment Variables
        run: |
          echo "POSTGRES_HOST=localhost" >> $GITHUB_ENV
          echo "POSTGRES_PORT=5432" >> $GITHUB_ENV
          echo "POSTGRES_DB=kb_system" >> $GITHUB_ENV
          echo "POSTGRES_USER=kb_admin" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=password" >> $GITHUB_ENV
          echo "QDRANT_HOST=localhost" >> $GITHUB_ENV
          echo "REDIS_URL=redis://localhost:6379/0" >> $GITHUB_ENV
          echo "MINIO_ENDPOINT=localhost:9000" >> $GITHUB_ENV
          echo "MINIO_USER=minioadmin" >> $GITHUB_ENV
          echo "MINIO_PASSWORD=minioadmin" >> $GITHUB_ENV
          echo "MINIO_BUCKET=kb-documents" >> $GITHUB_ENV
          echo "EMBEDDING_API_KEY=dummy" >> $GITHUB_ENV
          echo "RERANK_API_KEY=dummy" >> $GITHUB_ENV
          echo "ZHIPU_API_KEY=dummy" >> $GITHUB_ENV
          echo "MINIMAX_API_KEY=dummy" >> $GITHUB_ENV
          # 2026-05-12:main.py 启动时校验 JWT_SECRET_KEY 非默认值,CI 给个一次性随机值即可
          echo "JWT_SECRET_KEY=ci-test-$(openssl rand -hex 16)" >> $GITHUB_ENV
          echo "KB_ENV=development" >> $GITHUB_ENV

      - name: Initialize Infrastructure
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          python scripts/init_db.py
          python scripts/init_qdrant.py
          python scripts/init_minio.py

      - name: Start API Service in background
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          cd backend && uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Run Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          pytest backend/tests/test_phase0.py -v
