name: CI/CD Workflow

on:
  push:
    branches: [ "main" ]
    # 纯文档改动不触发 CI(deploy 占盘 + 慢)
    # 注:backend/prompts/**.md 是 LLM 提示词,改了影响生产,要触发,所以不在这里 ignore
    paths-ignore:
      - 'LEARNING.md'
      - 'PROJECT_OVERVIEW.md'
      - 'CLAUDE.md'
      - 'CHANGELOG.md'
      - 'task.md'
      - 'backend/services/agentic/skills_roadmap.md'
      - '.gitignore'
      - 'desktop/**'
      - '.github/workflows/desktop-build.yml'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'LEARNING.md'
      - 'PROJECT_OVERVIEW.md'
      - 'CLAUDE.md'
      - 'CHANGELOG.md'
      - 'task.md'
      - 'backend/services/agentic/skills_roadmap.md'
      - '.gitignore'
      - 'desktop/**'
      - '.github/workflows/desktop-build.yml'

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE:  ${{ github.repository }}-backend
  FRONTEND_IMAGE: ${{ github.repository }}-frontend
  DOCKER_BUILDKIT: 1

jobs:
  frontend-check:
    name: Frontend tsc + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci
      - name: Type check
        run: cd frontend && npx tsc --noEmit -p tsconfig.json
      - name: Build
        run: cd frontend && npm run build

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kb_system
          POSTGRES_USER: kb_admin
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start MinIO manually
        run: |
          docker run -d -p 9000:9000 -p 9001:9001 --name minio \
            -e "MINIO_ROOT_USER=minioadmin" \
            -e "MINIO_ROOT_PASSWORD=minioadmin" \
            minio/minio server /data

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio

      - name: Set up Environment Variables
        run: |
          echo "POSTGRES_HOST=localhost" >> $GITHUB_ENV
          echo "POSTGRES_PORT=5432" >> $GITHUB_ENV
          echo "POSTGRES_DB=kb_system" >> $GITHUB_ENV
          echo "POSTGRES_USER=kb_admin" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=password" >> $GITHUB_ENV
          echo "QDRANT_HOST=localhost" >> $GITHUB_ENV
          echo "REDIS_URL=redis://localhost:6379/0" >> $GITHUB_ENV
          echo "MINIO_ENDPOINT=localhost:9000" >> $GITHUB_ENV
          echo "MINIO_USER=minioadmin" >> $GITHUB_ENV
          echo "MINIO_PASSWORD=minioadmin" >> $GITHUB_ENV
          echo "MINIO_BUCKET=kb-documents" >> $GITHUB_ENV
          echo "EMBEDDING_API_KEY=dummy" >> $GITHUB_ENV
          echo "RERANK_API_KEY=dummy" >> $GITHUB_ENV
          echo "ZHIPU_API_KEY=dummy" >> $GITHUB_ENV
          echo "MINIMAX_API_KEY=dummy" >> $GITHUB_ENV

      - name: Initialize Infrastructure
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          python scripts/init_db.py
          python scripts/init_qdrant.py
          python scripts/init_minio.py

      - name: Start API Service in background
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          cd backend && uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Run Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          pytest backend/tests/test_phase0.py -v

  build-and-push:
    name: Build and Push Docker Images
    needs: [test, frontend-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to Server
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "value=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        # 2026-05-12 改进:用 sha-xxxxxxx 标签而非 latest,失败时能 docker compose up <旧 sha> 回滚
        # 上一次成功的 sha 写到 .last-good-sha,人工或脚本回滚用
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main || echo "Not a git repo or no changes"

            SHORT_SHA="${{ steps.sha.outputs.value }}"
            export BACKEND_IMAGE=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:sha-${SHORT_SHA}
            export FRONTEND_IMAGE=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:sha-${SHORT_SHA}

            # 备份当前 last-good 以便回滚
            if [ -f .last-good-sha ]; then
              cp .last-good-sha .prev-good-sha
            fi

            docker compose pull backend celery_worker frontend
            docker compose up -d

            # 等 30s 然后健康检查
            sleep 30
            if curl -fsS http://127.0.0.1:8000/health > /dev/null 2>&1; then
              echo "$SHORT_SHA" > .last-good-sha
              echo "✅ Deployed sha-${SHORT_SHA}"
            else
              echo "❌ Health check failed for sha-${SHORT_SHA}"
              if [ -f .prev-good-sha ]; then
                PREV=$(cat .prev-good-sha)
                echo "回滚到 sha-${PREV}"
                export BACKEND_IMAGE=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:sha-${PREV}
                export FRONTEND_IMAGE=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:sha-${PREV}
                docker compose up -d
              fi
              exit 1
            fi

            docker compose ps

      - name: Notify on failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          SHORT_SHA: ${{ steps.sha.outputs.value }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL 未配置,跳过通知"
            exit 0
          fi
          curl -sS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"❌ KB 部署失败 sha=${SHORT_SHA} ${COMMIT_MSG}\"}}" \
          || echo "webhook 通知失败"
