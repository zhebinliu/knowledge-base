name: Deploy PROD

# 生产部署:
#   - 仅手动触发(workflow_dispatch),避免误推 main 把 prod 改了
#   - 条件构建(2026-07-14):对比上次部署的 prod-live tag,只构建 / 重启变更的服务
#     (backend / frontend / edge);单边改动省构建时间。
#   - 部署前后自动 prune 镜像,根治 /opt/data 满导致 postgres 崩溃
#   - SSH 部署:滚动重启(maintenance flag + 健康检查 + 回滚)
#   - 影响域名:kb.liii.in / kb.tokenwave.cloud;不动 frontend-uat
#   - edge(80/443 入口)只在 edge/ 或 docker-compose.yml 变更时才重建 —— 那是唯一
#     会闪断 aihub/skillhub/kanban/studio 的场景;日常前后端部署不碰 edge
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '部署到生产 kb.liii.in,确认请填 "deploy"'
        required: true
        type: string
      force_all:
        description: '强制全量构建(backend+frontend+edge,忽略变更检测),填 "yes" 开启'
        required: false
        type: string
        default: ''

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE:       ${{ github.repository }}-backend
  FRONTEND_PROD_IMAGE: ${{ github.repository }}-frontend-prod
  EDGE_IMAGE_NAME:     ${{ github.repository }}-edge
  DOCKER_BUILDKIT: 1

jobs:
  guard:
    name: Confirm input
    runs-on: ubuntu-latest
    steps:
      - name: Check confirm string
        run: |
          if [ "${{ inputs.confirm }}" != "deploy" ]; then
            echo "❌ 必须填 'deploy' 才能触发,当前是 '${{ inputs.confirm }}'"
            exit 1
          fi
          echo "✅ Confirmed: deploying to PROD"

  changes:
    name: Detect changed services
    needs: guard
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      edge: ${{ steps.filter.outputs.edge }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Diff against last prod-live tag
        id: filter
        run: |
          # 强制全量
          if [ "${{ inputs.force_all }}" = "yes" ]; then
            echo "→ force_all=yes,全量构建"
            echo "backend=true"  >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "edge=true"     >> $GITHUB_OUTPUT
            exit 0
          fi
          # 取上次部署基准(prod-live tag)
          git fetch origin 'refs/tags/prod-live:refs/tags/prod-live' 2>/dev/null || true
          if git rev-parse prod-live >/dev/null 2>&1; then
            BASE=$(git rev-parse prod-live)
          else
            BASE=""
          fi
          if [ -z "$BASE" ]; then
            echo "→ 无 prod-live 基准(首次),全量构建"
            echo "backend=true"  >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "edge=true"     >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "→ 对比基准 $BASE .. HEAD"
          CHANGED=$(git diff --name-only "$BASE" HEAD || echo "")
          echo "$CHANGED"
          BE=false; FE=false; ED=false
          echo "$CHANGED" | grep -qE '^(backend/|meeting/backend/|docker-compose\.yml)' && BE=true || true
          echo "$CHANGED" | grep -qE '^(frontend/|meeting/frontend/)' && FE=true || true
          # edge = 80/443 入口,重建会闪断全部域名(含 aihub/skillhub)—— 只在
          # edge/ 或 docker-compose.yml(服务定义)变更时才动它
          echo "$CHANGED" | grep -qE '^(edge/|docker-compose\.yml)' && ED=true || true
          # 兜底:没匹配到任何一边(如只改 .github / 文档)→ backend+frontend 都建;
          # edge 不进兜底 —— 宁可漏也不无谓闪断其它站点
          if [ "$BE" = "false" ] && [ "$FE" = "false" ] && [ "$ED" = "false" ]; then BE=true; FE=true; fi
          echo "→ backend=$BE frontend=$FE edge=$ED"
          echo "backend=$BE"  >> $GITHUB_OUTPUT
          echo "frontend=$FE" >> $GITHUB_OUTPUT
          echo "edge=$ED"     >> $GITHUB_OUTPUT

  test:
    name: Run Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kb_system
          POSTGRES_USER: kb_admin
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    steps:
      - uses: actions/checkout@v6

      # meeting 模块在 meeting/ 子目录,非 Docker 的 CI job 需手动 overlay
      - name: Overlay meeting/
        run: |
          cp -r meeting/backend/. backend/
          cp -r meeting/frontend/. frontend/

      - name: Start MinIO manually
        run: |
          docker run -d -p 9000:9000 -p 9001:9001 --name minio \
            -e "MINIO_ROOT_USER=minioadmin" \
            -e "MINIO_ROOT_PASSWORD=minioadmin" \
            minio/minio server /data

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio

      - name: Set up Environment Variables
        run: |
          echo "POSTGRES_HOST=localhost" >> $GITHUB_ENV
          echo "POSTGRES_PORT=5432" >> $GITHUB_ENV
          echo "POSTGRES_DB=kb_system" >> $GITHUB_ENV
          echo "POSTGRES_USER=kb_admin" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=password" >> $GITHUB_ENV
          echo "QDRANT_HOST=localhost" >> $GITHUB_ENV
          echo "REDIS_URL=redis://localhost:6379/0" >> $GITHUB_ENV
          echo "MINIO_ENDPOINT=localhost:9000" >> $GITHUB_ENV
          echo "MINIO_USER=minioadmin" >> $GITHUB_ENV
          echo "MINIO_PASSWORD=minioadmin" >> $GITHUB_ENV
          echo "MINIO_BUCKET=kb-documents" >> $GITHUB_ENV
          echo "EMBEDDING_API_KEY=dummy" >> $GITHUB_ENV
          echo "RERANK_API_KEY=dummy" >> $GITHUB_ENV
          echo "ZHIPU_API_KEY=dummy" >> $GITHUB_ENV
          echo "MINIMAX_API_KEY=dummy" >> $GITHUB_ENV
          echo "JWT_SECRET_KEY=ci-test-$(openssl rand -hex 16)" >> $GITHUB_ENV
          echo "KB_ENV=development" >> $GITHUB_ENV

      - name: Initialize Infrastructure
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          python scripts/init_db.py
          python scripts/init_qdrant.py
          python scripts/init_minio.py

      - name: Start API Service in background
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          cd backend && uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Run Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          pytest backend/tests/test_phase0.py -v

  frontend-check:
    name: Frontend tsc + build
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Overlay meeting/
        run: |
          cp -r meeting/backend/. backend/
          cp -r meeting/frontend/. frontend/
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci --legacy-peer-deps
      - run: cd frontend && npx tsc --noEmit -p tsconfig.json
      - run: cd frontend && npm run build

  build-backend:
    name: Build & push backend
    needs: [changes, test]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            latest
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    name: Build & push frontend-prod
    needs: [changes, frontend-check]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata for frontend-prod
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_PROD_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            latest
      - name: Build & push frontend-prod
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            ENV=prod
            GIT_SHA=${{ github.sha }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend-prod
          cache-to: type=gha,mode=max,scope=frontend-prod

  build-edge:
    name: Build & push edge
    needs: changes
    if: needs.changes.outputs.edge == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata for edge
        id: meta-edge
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.EDGE_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            latest
      - name: Build & push edge
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./edge/Dockerfile
          push: true
          tags: ${{ steps.meta-edge.outputs.tags }}
          labels: ${{ steps.meta-edge.outputs.labels }}
          cache-from: type=gha,scope=edge
          cache-to: type=gha,mode=max,scope=edge

  deploy:
    name: Deploy PROD to server
    needs: [changes, build-backend, build-frontend, build-edge]
    # 变更检测成功 + 所有构建都没失败(可能被 skip)才部署
    if: >-
      always()
      && needs.changes.result == 'success'
      && needs.build-backend.result != 'failure'
      && needs.build-frontend.result != 'failure'
      && needs.build-edge.result != 'failure'
      && (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success' || needs.build-edge.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 部署成功后推 prod-live tag

    steps:
      - uses: actions/checkout@v6

      - name: Compute short SHA
        id: sha
        run: echo "value=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          FERNET_KEY_SECRET: ${{ secrets.FERNET_KEY }}
          DEPLOY_BE: ${{ needs.changes.outputs.backend }}
          DEPLOY_FE: ${{ needs.changes.outputs.frontend }}
          DEPLOY_ED: ${{ needs.changes.outputs.edge }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          envs: FERNET_KEY_SECRET,DEPLOY_BE,DEPLOY_FE,DEPLOY_ED
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main 2>&1 | tail -5 || echo "git pull failed, continuing with docker images only"

            if [ -n "$FERNET_KEY_SECRET" ] && ! grep -q '^FERNET_KEY=' .env 2>/dev/null; then
              echo "FERNET_KEY=$FERNET_KEY_SECRET" >> .env
              echo "→ FERNET_KEY 首次写入 .env(从 GitHub Secrets 恢复)"
            fi

            SHORT_SHA="${{ steps.sha.outputs.value }}"
            BACKEND_IMAGE_FULL="${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:sha-${SHORT_SHA}"
            FRONTEND_IMAGE_FULL="${{ env.REGISTRY }}/${{ env.FRONTEND_PROD_IMAGE }}:sha-${SHORT_SHA}"
            EDGE_IMAGE_FULL="${{ env.REGISTRY }}/${{ env.EDGE_IMAGE_NAME }}:sha-${SHORT_SHA}"
            echo "→ 本次部署 backend=${DEPLOY_BE} frontend=${DEPLOY_FE} edge=${DEPLOY_ED}"

            # ── 部署前清理旧镜像,腾空间(根治 /opt/data 满导致 pull/up 失败)──
            echo "→ 部署前清理旧镜像"
            sudo docker image prune -af 2>&1 | tail -1 || true
            df -h /opt/data 2>/dev/null | tail -1 || true

            # 待操作的服务列表(edge 单独处理:必须在 frontend 之后 up,
            # 首次 cutover 时旧 frontend 先释放 80/443 端口 edge 才能绑上)
            UP_SVCS=""
            [ "$DEPLOY_BE" = "true" ] && UP_SVCS="$UP_SVCS backend celery_worker"
            [ "$DEPLOY_FE" = "true" ] && UP_SVCS="$UP_SVCS frontend"
            if [ -z "$UP_SVCS" ] && [ "$DEPLOY_ED" != "true" ]; then
              echo "⚠️ 无变更服务,跳过镜像更新"
              exit 0
            fi

            if [ -f .last-good-sha ]; then cp .last-good-sha .prev-good-sha; fi
            sudo mkdir -p /opt/kb-system/run
            sudo touch /opt/kb-system/run/.maintenance

            # 先把所有镜像拉齐(慢操作前置,重启窗口最短)
            PULL_SVCS="$UP_SVCS"
            [ "$DEPLOY_ED" = "true" ] && PULL_SVCS="$PULL_SVCS edge"
            sudo BACKEND_IMAGE="${BACKEND_IMAGE_FULL}" FRONTEND_IMAGE="${FRONTEND_IMAGE_FULL}" EDGE_IMAGE="${EDGE_IMAGE_FULL}" \
              docker compose pull $PULL_SVCS
            if [ -n "$UP_SVCS" ]; then
              sudo BACKEND_IMAGE="${BACKEND_IMAGE_FULL}" FRONTEND_IMAGE="${FRONTEND_IMAGE_FULL}" EDGE_IMAGE="${EDGE_IMAGE_FULL}" \
                docker compose up -d --no-deps $UP_SVCS
            fi
            if [ "$DEPLOY_ED" = "true" ]; then
              sudo BACKEND_IMAGE="${BACKEND_IMAGE_FULL}" FRONTEND_IMAGE="${FRONTEND_IMAGE_FULL}" EDGE_IMAGE="${EDGE_IMAGE_FULL}" \
                docker compose up -d --no-deps edge
            fi

            sleep 3
            ALIGN_OK=true
            if [ "$DEPLOY_BE" = "true" ]; then
              BE_IMAGE=$(sudo docker inspect kb-system-backend-1 --format '{{.Config.Image}}' 2>/dev/null || echo "")
              if [ "$BE_IMAGE" != "$BACKEND_IMAGE_FULL" ]; then
                echo "❌ backend 对齐失败:预期=$BACKEND_IMAGE_FULL 实际=$BE_IMAGE"; ALIGN_OK=false
              fi
            fi
            if [ "$DEPLOY_FE" = "true" ]; then
              FE_IMAGE=$(sudo docker inspect kb-system-frontend-1 --format '{{.Config.Image}}' 2>/dev/null || echo "")
              if [ "$FE_IMAGE" != "$FRONTEND_IMAGE_FULL" ]; then
                echo "❌ frontend 对齐失败:预期=$FRONTEND_IMAGE_FULL 实际=$FE_IMAGE"; ALIGN_OK=false
              fi
            fi
            if [ "$DEPLOY_ED" = "true" ]; then
              ED_IMAGE=$(sudo docker inspect kb-system-edge-1 --format '{{.Config.Image}}' 2>/dev/null || echo "")
              if [ "$ED_IMAGE" != "$EDGE_IMAGE_FULL" ]; then
                echo "❌ edge 对齐失败:预期=$EDGE_IMAGE_FULL 实际=$ED_IMAGE"; ALIGN_OK=false
              fi
            fi
            if [ "$ALIGN_OK" != "true" ]; then
              sudo rm -f /opt/kb-system/run/.maintenance; exit 1
            fi
            echo "✓ 容器 image 已对齐"

            # edge 部署时:验证 80/443 入口活着(host 直接 curl :80,穿透端口绑定)
            if [ "$DEPLOY_ED" = "true" ]; then
              EDGE_OK=false
              for i in $(seq 1 6); do
                if curl -fsS http://127.0.0.1/health 2>/dev/null | grep -q ok; then
                  EDGE_OK=true; echo "✅ edge healthy after $((i*5))s"; break
                fi
                sleep 5
              done
              if [ "$EDGE_OK" != "true" ]; then
                echo "❌ edge 健康检查失败(80/443 入口不通,影响全部域名!)"
                sudo docker compose logs --tail 50 edge || true
                sudo rm -f /opt/kb-system/run/.maintenance
                exit 1
              fi
            fi

            HEALTHY=false
            for i in $(seq 1 24); do
              if curl -fsS http://127.0.0.1:8000/health > /dev/null 2>&1; then
                HEALTHY=true; echo "✅ Healthy after $((i*5))s"; break
              fi
              sleep 5
            done

            if [ "$HEALTHY" = "true" ]; then
              echo "$SHORT_SHA" > .last-good-sha
              [ "$DEPLOY_BE" = "true" ] && sudo docker tag "$BACKEND_IMAGE_FULL"  kb-backend:latest       || true
              [ "$DEPLOY_FE" = "true" ] && sudo docker tag "$FRONTEND_IMAGE_FULL" kb-frontend-prod:latest || true
              [ "$DEPLOY_ED" = "true" ] && sudo docker tag "$EDGE_IMAGE_FULL"     kb-edge:latest          || true
              sudo rm -f /opt/kb-system/run/.maintenance
              # backend 容器重建后 IP 会变;前端 nginx 用静态 proxy_pass http://backend:8000,
              # 只在启动时解析一次 —— 不 reload 就会一直连旧 IP,/api 全 502 导致登录不了。
              # DEPLOY_FE=true 时前端容器已重建(启动即重新解析),这里 reload 冗余但无害。
              if [ "$DEPLOY_BE" = "true" ]; then
                echo "→ backend 已重建,reload 前端 nginx 重新解析 backend upstream"
                sudo docker exec kb-system-frontend-1 nginx -s reload 2>&1 || true
                sudo docker exec kb-system-frontend-uat-1 nginx -s reload 2>&1 || true
              fi
              echo "✅ PROD deployed sha-${SHORT_SHA}(be=$DEPLOY_BE fe=$DEPLOY_FE)"
              # 部署后再清一次(删掉被替换的旧镜像)
              echo "→ 部署后清理旧镜像"
              sudo docker image prune -af 2>&1 | tail -1 || true
              df -h /opt/data 2>/dev/null | tail -1 || true
            else
              echo "❌ Health check failed after 120s for sha-${SHORT_SHA}"
              echo "--- backend logs ---"
              sudo docker compose logs --tail 50 backend || true
              if [ -f .prev-good-sha ] && [ -n "$UP_SVCS" ]; then
                PREV=$(cat .prev-good-sha)
                echo "回滚到 sha-${PREV}(仅本次部署的服务:$UP_SVCS;edge 不自动回滚,失败需人工处理)"
                PREV_BE="${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:sha-${PREV}"
                PREV_FE="${{ env.REGISTRY }}/${{ env.FRONTEND_PROD_IMAGE }}:sha-${PREV}"
                sudo BACKEND_IMAGE="${PREV_BE}" FRONTEND_IMAGE="${PREV_FE}" EDGE_IMAGE="${EDGE_IMAGE_FULL}" \
                  docker compose up -d --no-deps $UP_SVCS
                sleep 30
                # 回滚也重建了 backend → 同样要 reload 前端 nginx 重新解析 upstream
                if [ "$DEPLOY_BE" = "true" ]; then
                  sudo docker exec kb-system-frontend-1 nginx -s reload 2>&1 || true
                  sudo docker exec kb-system-frontend-uat-1 nginx -s reload 2>&1 || true
                fi
                sudo rm -f /opt/kb-system/run/.maintenance
              else
                echo "⚠️  无 .prev-good-sha,跳过回滚"
                sudo rm -f /opt/kb-system/run/.maintenance
              fi
              exit 1
            fi

            sudo docker compose ps

      - name: Mark prod-live tag
        if: success()
        run: |
          git tag -f prod-live ${{ github.sha }}
          git push -f origin prod-live

      - name: Notify on failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          SHORT_SHA: ${{ steps.sha.outputs.value }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL 未配置,跳过通知"
            exit 0
          fi
          curl -sS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"❌ KB PROD 部署失败 sha=${SHORT_SHA} ${COMMIT_MSG}\"}}" \
          || echo "webhook 通知失败"
