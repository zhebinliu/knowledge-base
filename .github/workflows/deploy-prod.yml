name: Deploy PROD

# 生产部署:
#   - 仅手动触发(workflow_dispatch),避免误推 main 把 prod 改了
#   - 构建 / 推送 backend + frontend-prod 镜像
#   - SSH 部署:全栈滚动重启(maintenance flag + 健康检查 + 回滚)
#   - 影响域名:kb.liii.in / kb.tokenwave.cloud
#   - 不动 frontend-uat 容器(uat 走自己的 deploy-uat workflow)
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '部署到生产 kb.liii.in,确认请填 "deploy"'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE:       ${{ github.repository }}-backend
  FRONTEND_PROD_IMAGE: ${{ github.repository }}-frontend-prod
  DOCKER_BUILDKIT: 1

jobs:
  guard:
    name: Confirm input
    runs-on: ubuntu-latest
    steps:
      - name: Check confirm string
        run: |
          if [ "${{ inputs.confirm }}" != "deploy" ]; then
            echo "❌ 必须填 'deploy' 才能触发,当前是 '${{ inputs.confirm }}'"
            exit 1
          fi
          echo "✅ Confirmed: deploying to PROD"

  test:
    name: Run Tests
    needs: guard
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kb_system
          POSTGRES_USER: kb_admin
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    steps:
      - uses: actions/checkout@v6

      # meeting 模块在 meeting/ 子目录,非 Docker 的 CI job 需手动 overlay
      - name: Overlay meeting/
        run: |
          cp -r meeting/backend/. backend/
          cp -r meeting/frontend/. frontend/

      - name: Start MinIO manually
        run: |
          docker run -d -p 9000:9000 -p 9001:9001 --name minio \
            -e "MINIO_ROOT_USER=minioadmin" \
            -e "MINIO_ROOT_PASSWORD=minioadmin" \
            minio/minio server /data

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio

      - name: Set up Environment Variables
        run: |
          echo "POSTGRES_HOST=localhost" >> $GITHUB_ENV
          echo "POSTGRES_PORT=5432" >> $GITHUB_ENV
          echo "POSTGRES_DB=kb_system" >> $GITHUB_ENV
          echo "POSTGRES_USER=kb_admin" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=password" >> $GITHUB_ENV
          echo "QDRANT_HOST=localhost" >> $GITHUB_ENV
          echo "REDIS_URL=redis://localhost:6379/0" >> $GITHUB_ENV
          echo "MINIO_ENDPOINT=localhost:9000" >> $GITHUB_ENV
          echo "MINIO_USER=minioadmin" >> $GITHUB_ENV
          echo "MINIO_PASSWORD=minioadmin" >> $GITHUB_ENV
          echo "MINIO_BUCKET=kb-documents" >> $GITHUB_ENV
          echo "EMBEDDING_API_KEY=dummy" >> $GITHUB_ENV
          echo "RERANK_API_KEY=dummy" >> $GITHUB_ENV
          echo "ZHIPU_API_KEY=dummy" >> $GITHUB_ENV
          echo "MINIMAX_API_KEY=dummy" >> $GITHUB_ENV
          echo "JWT_SECRET_KEY=ci-test-$(openssl rand -hex 16)" >> $GITHUB_ENV
          echo "KB_ENV=development" >> $GITHUB_ENV

      - name: Initialize Infrastructure
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          python scripts/init_db.py
          python scripts/init_qdrant.py
          python scripts/init_minio.py

      - name: Start API Service in background
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          cd backend && uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Run Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          pytest backend/tests/test_phase0.py -v

  frontend-check:
    name: Frontend tsc + build
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Overlay meeting/
        run: |
          cp -r meeting/backend/. backend/
          cp -r meeting/frontend/. frontend/
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci --legacy-peer-deps
      - run: cd frontend && npx tsc --noEmit -p tsconfig.json
      - run: cd frontend && npm run build

  build-and-push:
    name: Build & push backend + frontend-prod
    needs: [test, frontend-check]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          # context 改为仓库根(meeting/ overlay 需要),Dockerfile 显式指定
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Extract metadata for frontend-prod
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_PROD_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Build & push frontend-prod
        uses: docker/build-push-action@v5
        with:
          # context 改为仓库根(meeting/ overlay 需要),Dockerfile 显式指定
          context: .
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            ENV=prod
            GIT_SHA=${{ github.sha }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend-prod
          cache-to: type=gha,mode=max,scope=frontend-prod

  deploy:
    name: Deploy PROD to server
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Compute short SHA
        id: sha
        run: echo "value=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          # Fernet 主密钥(2026-05-29):企信/飞书/sharedev 用户级凭证 secret 全靠它加密。
          # 必须固定不变 — key 一变,所有历史密文解不开,用户得重配。
          # GitHub Secrets 是 source of truth,服务器 .env 丢失(换机/误删)时
          # Deploy via SSH 步骤会自动幂等写回。
          FERNET_KEY_SECRET: ${{ secrets.FERNET_KEY }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          envs: FERNET_KEY_SECRET
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main 2>&1 | tail -5 || echo "git pull failed, continuing with docker images only"

            # ── 幂等注入 FERNET_KEY 到 .env(2026-05-29) ──────────────────
            # 第一次部署 / 换机后 .env 没有 FERNET_KEY 时,从 GitHub Secrets 写回。
            # 已存在(常态)就跳过,保留服务器值。GitHub Secrets 没配也跳过(允许
            # 用户先手工管 .env,等准备好再上 secrets)。
            if [ -n "$FERNET_KEY_SECRET" ] && ! grep -q '^FERNET_KEY=' .env 2>/dev/null; then
              echo "FERNET_KEY=$FERNET_KEY_SECRET" >> .env
              echo "→ FERNET_KEY 首次写入 .env(从 GitHub Secrets 恢复)"
            fi

            SHORT_SHA="${{ steps.sha.outputs.value }}"
            BACKEND_IMAGE_FULL="${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:sha-${SHORT_SHA}"
            FRONTEND_IMAGE_FULL="${{ env.REGISTRY }}/${{ env.FRONTEND_PROD_IMAGE }}:sha-${SHORT_SHA}"
            echo "→ target backend:  ${BACKEND_IMAGE_FULL}"
            echo "→ target frontend: ${FRONTEND_IMAGE_FULL}"

            # 备份当前 last-good 以便回滚
            if [ -f .last-good-sha ]; then
              cp .last-good-sha .prev-good-sha
            fi

            # 维护开关
            sudo mkdir -p /opt/kb-system/run
            sudo touch /opt/kb-system/run/.maintenance

            # sudo 默认清环境变量 — 用 sudo VAR=val 显式透传,否则 docker-compose.yml 的
            # ${BACKEND_IMAGE:-kb-backend:latest} 会 fall back 到本地老 image
            sudo \
              BACKEND_IMAGE="${BACKEND_IMAGE_FULL}" \
              FRONTEND_IMAGE="${FRONTEND_IMAGE_FULL}" \
              docker compose pull backend celery_worker frontend
            sudo \
              BACKEND_IMAGE="${BACKEND_IMAGE_FULL}" \
              FRONTEND_IMAGE="${FRONTEND_IMAGE_FULL}" \
              docker compose up -d --no-deps backend celery_worker frontend

            # 验证容器 image 对齐(防 pull/up 静默没换)
            sleep 3
            FE_IMAGE=$(sudo docker inspect kb-system-frontend-1 --format '{{.Config.Image}}' 2>/dev/null || echo "")
            BE_IMAGE=$(sudo docker inspect kb-system-backend-1 --format '{{.Config.Image}}' 2>/dev/null || echo "")
            if [ "$FE_IMAGE" != "$FRONTEND_IMAGE_FULL" ] || [ "$BE_IMAGE" != "$BACKEND_IMAGE_FULL" ]; then
              echo "❌ 容器 image 对齐失败:"
              echo "  frontend  预期=$FRONTEND_IMAGE_FULL  实际=$FE_IMAGE"
              echo "  backend   预期=$BACKEND_IMAGE_FULL   实际=$BE_IMAGE"
              sudo rm -f /opt/kb-system/run/.maintenance
              exit 1
            fi
            echo "✓ 容器 image 已对齐"

            # 健康检查
            HEALTHY=false
            for i in $(seq 1 24); do
              if curl -fsS http://127.0.0.1:8000/health > /dev/null 2>&1; then
                HEALTHY=true
                echo "✅ Healthy after $((i*5))s"
                break
              fi
              sleep 5
            done

            if [ "$HEALTHY" = "true" ]; then
              echo "$SHORT_SHA" > .last-good-sha
              # 2026-06-09 修 fallback tag 老代码事故:把 docker-compose.yml 的
              # fallback tag(kb-backend:latest / kb-frontend-prod:latest)也 retag
              # 到当前 sha image。这样将来任何人手动 `docker compose up` 不带
              # BACKEND_IMAGE / FRONTEND_IMAGE env,也不会拉到本地早期 build 的过期
              # :latest tag — 不会再出"deploy 完几小时后被悄悄拽回老代码"的事故。
              sudo docker tag "$BACKEND_IMAGE_FULL"  kb-backend:latest       || true
              sudo docker tag "$FRONTEND_IMAGE_FULL" kb-frontend-prod:latest || true
              sudo rm -f /opt/kb-system/run/.maintenance
              echo "✅ PROD deployed sha-${SHORT_SHA}"
            else
              echo "❌ Health check failed after 120s for sha-${SHORT_SHA}"
              echo "--- backend logs ---"
              sudo docker compose logs --tail 50 backend || true
              if [ -f .prev-good-sha ]; then
                PREV=$(cat .prev-good-sha)
                echo "回滚到 sha-${PREV}"
                PREV_BE="${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:sha-${PREV}"
                PREV_FE="${{ env.REGISTRY }}/${{ env.FRONTEND_PROD_IMAGE }}:sha-${PREV}"
                sudo \
                  BACKEND_IMAGE="${PREV_BE}" \
                  FRONTEND_IMAGE="${PREV_FE}" \
                  docker compose up -d --no-deps backend celery_worker frontend
                sleep 30
                sudo rm -f /opt/kb-system/run/.maintenance
              else
                echo "⚠️  无 .prev-good-sha,跳过回滚"
                sudo rm -f /opt/kb-system/run/.maintenance
              fi
              exit 1
            fi

            sudo docker compose ps

      - name: Notify on failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          SHORT_SHA: ${{ steps.sha.outputs.value }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL 未配置,跳过通知"
            exit 0
          fi
          curl -sS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"❌ KB PROD 部署失败 sha=${SHORT_SHA} ${COMMIT_MSG}\"}}" \
          || echo "webhook 通知失败"
