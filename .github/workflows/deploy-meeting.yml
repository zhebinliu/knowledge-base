name: Deploy Meeting

# meeting 模块(git submodule → zhebinliu/ai-meeting)更新后自动部署。
#   - 触发:ai-meeting 仓 from-kb-system 分支 push → repository_dispatch(meeting-updated)
#           也支持手动 workflow_dispatch
#   - 流程:拉最新 from-kb-system → tsc/build 自检 → build 三镜像推 ghcr
#           → 把 meeting submodule pointer bump 回 main([skip ci])→ 部署 PROD + UAT
#   - 影响域名:kb.liii.in / kb.tokenwave.cloud(PROD)+ uat.tokenwave.cloud(UAT)
on:
  repository_dispatch:
    types: [meeting-updated]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE:       ${{ github.repository }}-backend
  FRONTEND_PROD_IMAGE: ${{ github.repository }}-frontend-prod
  FRONTEND_UAT_IMAGE:  ${{ github.repository }}-frontend-uat
  DOCKER_BUILDKIT: 1

jobs:
  # ── 1. 前端自检 —— 拉最新 meeting,确保 tsc + build 不挂 ───────────────────
  frontend-check:
    name: Frontend tsc + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Update meeting submodule to latest from-kb-system
        # checkout 的 submodule 是 shallow clone,没有 origin/from-kb-system 这个
        # 远程跟踪 ref,git submodule update --remote 会失败 —— 直接显式 fetch + checkout
        run: |
          git -C meeting fetch origin from-kb-system
          git -C meeting checkout FETCH_HEAD
      - name: Overlay meeting submodule
        run: |
          cp -r meeting/backend/. backend/
          cp -r meeting/frontend/. frontend/
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci --legacy-peer-deps
      - run: cd frontend && npx tsc --noEmit -p tsconfig.json
      - run: cd frontend && npm run build

  # ── 2. build 三镜像 + bump submodule pointer ──────────────────────────────
  build-and-push:
    name: Build & push backend + frontend-prod + frontend-uat
    needs: frontend-check
    runs-on: ubuntu-latest
    permissions:
      contents: write   # bump submodule pointer 回 main 需要
      packages: write
    outputs:
      meeting_sha: ${{ steps.msha.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update meeting submodule to latest from-kb-system
        # checkout 的 submodule 是 shallow clone,没有 origin/from-kb-system 这个
        # 远程跟踪 ref,git submodule update --remote 会失败 —— 直接显式 fetch + checkout
        run: |
          git -C meeting fetch origin from-kb-system
          git -C meeting checkout FETCH_HEAD

      - name: Compute meeting short SHA
        id: msha
        run: echo "value=$(git -C meeting rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:meeting-${{ steps.msha.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend-prod
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            ENV=prod
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_PROD_IMAGE }}:meeting-${{ steps.msha.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.FRONTEND_PROD_IMAGE }}:latest
          cache-from: type=gha,scope=frontend-prod
          cache-to: type=gha,mode=max,scope=frontend-prod

      - name: Build & push frontend-uat
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            ENV=uat
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_UAT_IMAGE }}:meeting-${{ steps.msha.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.FRONTEND_UAT_IMAGE }}:latest
          cache-from: type=gha,scope=frontend-uat
          cache-to: type=gha,mode=max,scope=frontend-uat

      # 把 meeting submodule pointer bump 回 main —— 否则后续手动 deploy-prod
      # 会用回 .gitmodules 里 pin 的旧 meeting commit,造成 meeting 代码回退。
      # [skip ci] 避免触发 deploy.yml / deploy-uat.yml 的 push 事件。
      - name: Bump meeting submodule pointer on main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add meeting
          if git diff --cached --quiet; then
            echo "meeting submodule pointer 未变,跳过 bump"
          else
            git commit -m "chore: bump meeting submodule → ${{ steps.msha.outputs.value }} [skip ci]"
            git pull --rebase origin main || true
            git push origin HEAD:main && echo "✅ meeting submodule pointer 已 bump" || echo "⚠️ pointer bump push 失败(不阻断部署)"
          fi

  # ── 3. 部署 PROD + UAT ────────────────────────────────────────────────────
  deploy:
    name: Deploy PROD + UAT to server
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main 2>&1 | tail -5 || echo "git pull failed, continuing with images only"

            TAG="meeting-${{ needs.build-and-push.outputs.meeting_sha }}"
            BE="${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${TAG}"
            FE="${{ env.REGISTRY }}/${{ env.FRONTEND_PROD_IMAGE }}:${TAG}"
            FE_UAT="${{ env.REGISTRY }}/${{ env.FRONTEND_UAT_IMAGE }}:${TAG}"
            echo "→ backend:      $BE"
            echo "→ frontend:     $FE"
            echo "→ frontend-uat: $FE_UAT"

            # 记录当前运行 image —— 失败时回滚用
            PREV_BE=$(sudo docker inspect kb-system-backend-1 --format '{{.Config.Image}}' 2>/dev/null || echo "")
            PREV_FE=$(sudo docker inspect kb-system-frontend-1 --format '{{.Config.Image}}' 2>/dev/null || echo "")
            PREV_UAT=$(sudo docker inspect kb-system-frontend-uat-1 --format '{{.Config.Image}}' 2>/dev/null || echo "")

            # 维护开关(PROD)
            sudo mkdir -p /opt/kb-system/run
            sudo touch /opt/kb-system/run/.maintenance

            # sudo 默认清环境变量 — 用 sudo VAR=val 显式透传,否则 docker-compose.yml 的
            # ${BACKEND_IMAGE:-...} 会 fall back 到本地旧 image
            # PROD: backend + celery_worker + frontend
            sudo BACKEND_IMAGE="$BE" FRONTEND_IMAGE="$FE" docker compose pull backend celery_worker frontend
            sudo BACKEND_IMAGE="$BE" FRONTEND_IMAGE="$FE" docker compose up -d --no-deps backend celery_worker frontend
            # UAT: frontend-uat
            sudo FRONTEND_UAT_IMAGE="$FE_UAT" docker compose pull frontend-uat
            sudo FRONTEND_UAT_IMAGE="$FE_UAT" docker compose up -d --no-deps frontend-uat

            # 验证容器 image 对齐
            sleep 3
            CUR_BE=$(sudo docker inspect kb-system-backend-1 --format '{{.Config.Image}}' 2>/dev/null || echo "")
            CUR_FE=$(sudo docker inspect kb-system-frontend-1 --format '{{.Config.Image}}' 2>/dev/null || echo "")
            if [ "$CUR_BE" != "$BE" ] || [ "$CUR_FE" != "$FE" ]; then
              echo "❌ 容器 image 对齐失败:backend 期望=$BE 实际=$CUR_BE / frontend 期望=$FE 实际=$CUR_FE"
              sudo rm -f /opt/kb-system/run/.maintenance
              exit 1
            fi

            # 健康检查 — PROD backend
            HEALTHY=false
            for i in $(seq 1 24); do
              if curl -fsS http://127.0.0.1:8000/health > /dev/null 2>&1; then
                HEALTHY=true
                echo "✅ backend healthy after $((i*5))s"
                break
              fi
              sleep 5
            done

            if [ "$HEALTHY" != "true" ]; then
              echo "❌ backend 健康检查 120s 未通过,回滚 PROD"
              sudo docker compose logs --tail 50 backend || true
              if [ -n "$PREV_BE" ]; then
                sudo BACKEND_IMAGE="$PREV_BE" FRONTEND_IMAGE="$PREV_FE" docker compose up -d --no-deps backend celery_worker frontend
                sleep 20
              fi
              sudo rm -f /opt/kb-system/run/.maintenance
              exit 1
            fi

            # 健康检查 — UAT frontend
            UAT_OK=false
            for i in $(seq 1 6); do
              if sudo docker exec kb-system-frontend-uat-1 wget -qO- http://127.0.0.1/health 2>/dev/null | grep -q ok; then
                UAT_OK=true
                echo "✅ frontend-uat healthy"
                break
              fi
              sleep 5
            done

            # PROD 已就绪 → 摘维护标志
            sudo rm -f /opt/kb-system/run/.maintenance

            if [ "$UAT_OK" != "true" ]; then
              echo "❌ frontend-uat 健康检查未通过,回滚 UAT"
              sudo docker compose logs --tail 30 frontend-uat || true
              if [ -n "$PREV_UAT" ]; then
                sudo FRONTEND_UAT_IMAGE="$PREV_UAT" docker compose up -d --no-deps frontend-uat
              fi
              exit 1
            fi

            echo "✅ Meeting 部署完成 ${TAG}(PROD + UAT)"
            sudo docker compose ps

      - name: Notify on failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          MEETING_SHA: ${{ needs.build-and-push.outputs.meeting_sha }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL 未配置,跳过通知"
            exit 0
          fi
          curl -sS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"❌ Meeting 自动部署失败 meeting-${MEETING_SHA}\"}}" \
          || echo "webhook 通知失败"
