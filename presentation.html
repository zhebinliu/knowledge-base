<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KB System — CRM 实施知识管理平台</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0f172a;--surface:#1e293b;--card:#334155;
    --primary:#3b82f6;--primary-light:#60a5fa;--accent:#8b5cf6;--accent2:#06b6d4;
    --green:#22c55e;--orange:#f59e0b;--red:#ef4444;
    --text:#f1f5f9;--text-dim:#94a3b8;--text-muted:#64748b;
    --radius:12px;
  }
  html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text)}
  #app{position:relative;width:100%;height:100%}
  .slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 80px;opacity:0;pointer-events:none;transition:opacity .5s ease}
  .slide.active{opacity:1;pointer-events:auto}
  .slide>*{opacity:0;transform:translateY(30px);transition:opacity .6s ease,transform .6s ease}
  .slide.active>*{opacity:1;transform:translateY(0)}
  .slide.active>*:nth-child(1){transition-delay:.1s}
  .slide.active>*:nth-child(2){transition-delay:.25s}
  .slide.active>*:nth-child(3){transition-delay:.4s}
  .slide.active>*:nth-child(4){transition-delay:.55s}
  .slide.active>*:nth-child(5){transition-delay:.7s}
  .slide.active>*:nth-child(6){transition-delay:.85s}
  h1{font-size:3rem;font-weight:800;letter-spacing:-1px;line-height:1.2}
  h2{font-size:2rem;font-weight:700;margin-bottom:12px}
  h3{font-size:1.25rem;font-weight:600;color:var(--primary-light)}
  .subtitle{font-size:1.3rem;color:var(--text-dim);margin-top:12px}
  .tag{display:inline-block;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:600;margin:4px}
  .tag-blue{background:rgba(59,130,246,.15);color:var(--primary-light);border:1px solid rgba(59,130,246,.3)}
  .tag-purple{background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.3)}
  .tag-green{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
  .tag-cyan{background:rgba(6,182,212,.15);color:#22d3ee;border:1px solid rgba(6,182,212,.3)}
  .tag-orange{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
  .card{background:var(--surface);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);padding:24px 28px;transition:transform .3s,border-color .3s,box-shadow .3s}
  .card:hover{transform:translateY(-4px);border-color:rgba(59,130,246,.3);box-shadow:0 8px 30px rgba(0,0,0,.3)}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;width:100%;max-width:1100px}
  .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;width:100%;max-width:1000px}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;width:100%;max-width:1100px}
  .icon-circle{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:12px}
  .flow-container{display:flex;align-items:center;gap:0;width:100%;max-width:1200px;flex-wrap:nowrap;justify-content:center}
  .flow-node{background:var(--surface);border:2px solid rgba(255,255,255,.1);border-radius:var(--radius);padding:16px 20px;text-align:center;min-width:120px;position:relative;transition:all .3s}
  .flow-node:hover{border-color:var(--primary);transform:scale(1.05);box-shadow:0 0 20px rgba(59,130,246,.2)}
  .flow-node .icon{font-size:1.8rem;margin-bottom:6px}
  .flow-node .label{font-size:.85rem;font-weight:600}
  .flow-node .desc{font-size:.7rem;color:var(--text-dim);margin-top:4px}
  .flow-arrow{color:var(--primary-light);font-size:1.5rem;margin:0 4px;flex-shrink:0}
  .stat{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,var(--primary-light),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .stat-label{font-size:.85rem;color:var(--text-dim);margin-top:4px}
  /* progress bar */
  #progress{position:fixed;bottom:0;left:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width .4s ease;z-index:100}
  /* nav */
  #nav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:16px;z-index:100;background:rgba(15,23,42,.8);backdrop-filter:blur(10px);padding:8px 20px;border-radius:30px;border:1px solid rgba(255,255,255,.1)}
  #nav button{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1.2rem;padding:4px 8px;border-radius:8px;transition:all .2s}
  #nav button:hover{color:var(--text);background:rgba(255,255,255,.1)}
  #page-num{font-size:.85rem;color:var(--text-muted);min-width:60px;text-align:center}
  /* TOC overlay */
  #toc{position:fixed;inset:0;background:rgba(15,23,42,.95);backdrop-filter:blur(20px);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px}
  #toc.show{display:flex}
  #toc .toc-item{padding:10px 24px;border-radius:8px;cursor:pointer;font-size:1rem;color:var(--text-dim);transition:all .2s;width:500px;text-align:left}
  #toc .toc-item:hover{background:var(--surface);color:var(--text);transform:translateX(8px)}
  #toc .toc-item.active{color:var(--primary-light);font-weight:600}
  #toc .toc-title{font-size:1.5rem;font-weight:700;margin-bottom:20px;color:var(--text)}
  /* arch diagram */
  .arch-layer{background:var(--surface);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);padding:16px 24px;margin-bottom:12px;display:flex;align-items:center;gap:16px;width:100%;max-width:1000px}
  .arch-layer .layer-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;min-width:80px;padding:4px 12px;border-radius:6px;text-align:center}
  .arch-layer .layer-items{display:flex;gap:10px;flex-wrap:wrap}
  .arch-layer .layer-item{background:var(--card);padding:6px 14px;border-radius:8px;font-size:.8rem;color:var(--text-dim);border:1px solid rgba(255,255,255,.05)}
  /* model route */
  .route-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;width:100%;max-width:900px}
  .route-task{min-width:140px;font-size:.85rem;font-weight:600;text-align:right;color:var(--text-dim)}
  .route-arrow{color:var(--text-muted);flex-shrink:0}
  .route-model{background:var(--surface);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 16px;font-size:.85rem;flex:1;transition:all .3s}
  .route-model:hover{border-color:var(--primary)}
  .route-model.primary{border-color:rgba(59,130,246,.4);background:rgba(59,130,246,.08)}
  .route-model.fallback{border-color:rgba(255,255,255,.06);opacity:.7}
  .route-badge{font-size:.65rem;padding:2px 8px;border-radius:10px;margin-left:8px}
  .route-badge-p{background:rgba(59,130,246,.2);color:var(--primary-light)}
  .route-badge-f{background:rgba(255,255,255,.08);color:var(--text-muted)}
  /* cycle diagram */
  .cycle{position:relative;width:400px;height:400px}
  .cycle-node{position:absolute;width:130px;text-align:center}
  .cycle-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;text-align:center;box-shadow:0 0 40px rgba(59,130,246,.3)}
  .cycle-node .c-icon{font-size:2rem;margin-bottom:4px}
  .cycle-node .c-label{font-size:.8rem;font-weight:600}
  .cycle-node .c-desc{font-size:.65rem;color:var(--text-dim);margin-top:2px}
  /* clickable hint */
  .click-hint{position:fixed;top:20px;right:20px;font-size:.75rem;color:var(--text-muted);z-index:50;opacity:.6}
  /* keyframes */
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .pulse{animation:pulse 2s infinite}
</style>
</head>
<body>
<div id="app"></div>
<div id="progress"></div>
<div id="nav">
  <button onclick="prev()" title="上一页">◀</button>
  <span id="page-num">1 / 12</span>
  <button onclick="next()" title="下一页">▶</button>
  <button onclick="toggleToc()" title="目录">☰</button>
</div>
<div id="toc">
  <div class="toc-title">目录</div>
</div>
<div class="click-hint">← → 翻页 · ESC 目录</div>

// ─── TOC titles ─────────────────────────────────
const tocTitles = [
  '封面', '痛点', '系统架构', '核心流程', '智能切片',
  'LTC 分类', 'RAG 问答', '知识挑战', '多模型路由', '项目管理',
  '技术栈', '总结'
];

// ─── Render ─────────────────────────────────────
const app = document.getElementById('app');
const progress = document.getElementById('progress');
const pageNum = document.getElementById('page-num');
const tocEl = document.getElementById('toc');
let current = 0;
let tocOpen = false;

function render() {
  app.innerHTML = '';
  slides.forEach((html, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === current ? ' active' : '');
    div.innerHTML = html;
    app.appendChild(div);
  });
  progress.style.width = ((current + 1) / slides.length * 100) + '%';
  pageNum.textContent = (current + 1) + ' / ' + slides.length;
  // rebuild TOC
  const tocTitle = tocEl.querySelector('.toc-title');
  tocEl.innerHTML = '';
  tocEl.appendChild(tocTitle);
  tocTitles.forEach((t, i) => {
    const item = document.createElement('div');
    item.className = 'toc-item' + (i === current ? ' active' : '');
    item.textContent = (i + 1) + '. ' + t;
    item.onclick = () => { goTo(i); toggleToc(); };
    tocEl.appendChild(item);
  });
}

function goTo(i) {
  if (i < 0 || i >= slides.length) return;
  current = i;
  render();
}
function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }
function toggleToc() {
  tocOpen = !tocOpen;
  tocEl.classList.toggle('show', tocOpen);
}

// keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
  else if (e.key === 'Escape') { toggleToc(); }
});

// click left/right edge
document.addEventListener('click', e => {
  if (tocOpen) return;
  const x = e.clientX / window.innerWidth;
  if (x < 0.2) prev();
  else if (x > 0.8) next();
});

// touch swipe
let touchX = 0;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 60) { dx > 0 ? prev() : next(); }
});

render();
</script>
