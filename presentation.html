<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识库 — CRM 实施知识管理平台</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0f172a;--surface:#1e293b;--card:#334155;
    --primary:#3b82f6;--primary-light:#60a5fa;--accent:#8b5cf6;--accent2:#06b6d4;
    --green:#22c55e;--orange:#f59e0b;--red:#ef4444;
    --text:#f1f5f9;--text-dim:#94a3b8;--text-muted:#64748b;
    --radius:12px;
  }
  html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text)}
  #app{position:relative;width:100%;height:100%}
  .slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 70px;opacity:0;pointer-events:none;transition:opacity .5s ease}
  .slide.active{opacity:1;pointer-events:auto}
  .slide>*{opacity:0;transform:translateY(24px);transition:opacity .5s ease,transform .5s ease}
  .slide.active>*{opacity:1;transform:translateY(0)}
  .slide.active>*:nth-child(1){transition-delay:.1s}
  .slide.active>*:nth-child(2){transition-delay:.2s}
  .slide.active>*:nth-child(3){transition-delay:.3s}
  .slide.active>*:nth-child(4){transition-delay:.4s}
  .slide.active>*:nth-child(5){transition-delay:.5s}
  .slide.active>*:nth-child(6){transition-delay:.6s}
  .slide.active>*:nth-child(7){transition-delay:.7s}
  .slide.active>*:nth-child(8){transition-delay:.8s}
  h1{font-size:3rem;font-weight:800;letter-spacing:-1px;line-height:1.2}
  h2{font-size:1.8rem;font-weight:700;margin-bottom:8px}
  h3{font-size:1.1rem;font-weight:600;color:var(--primary-light)}
  .subtitle{font-size:1.2rem;color:var(--text-dim);margin-top:10px}
  .tag{display:inline-block;padding:5px 16px;border-radius:20px;font-size:.8rem;font-weight:600;margin:4px}
  .tag-blue{background:rgba(59,130,246,.15);color:var(--primary-light);border:1px solid rgba(59,130,246,.3)}
  .tag-purple{background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.3)}
  .tag-green{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
  .tag-cyan{background:rgba(6,182,212,.15);color:#22d3ee;border:1px solid rgba(6,182,212,.3)}
  .tag-orange{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
  .card{background:var(--surface);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);padding:20px 24px;transition:transform .3s,border-color .3s,box-shadow .3s;cursor:default}
  .card:hover{transform:translateY(-4px);border-color:rgba(59,130,246,.3);box-shadow:0 8px 30px rgba(0,0,0,.3)}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;width:100%;max-width:1100px}
  .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;width:100%;max-width:1000px}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;width:100%;max-width:1100px}
  .icon-box{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;margin-bottom:10px}
  .flow-container{display:flex;align-items:center;gap:0;width:100%;max-width:1100px;flex-wrap:nowrap;justify-content:center}
  .flow-node{background:var(--surface);border:2px solid rgba(255,255,255,.1);border-radius:var(--radius);padding:14px 18px;text-align:center;min-width:110px;transition:all .3s;cursor:default}
  .flow-node:hover{border-color:var(--primary);transform:scale(1.08);box-shadow:0 0 25px rgba(59,130,246,.25)}
  .flow-node .num{font-size:1.4rem;font-weight:800;margin-bottom:4px;background:linear-gradient(135deg,var(--primary-light),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .flow-node .label{font-size:.82rem;font-weight:600}
  .flow-node .desc{font-size:.65rem;color:var(--text-dim);margin-top:3px}
  .flow-arrow{color:var(--primary-light);font-size:1.3rem;margin:0 3px;flex-shrink:0}
  .stat{font-size:2.2rem;font-weight:800;background:linear-gradient(135deg,var(--primary-light),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .stat-label{font-size:.8rem;color:var(--text-dim);margin-top:4px}
  /* interactive tooltip */
  .tip{position:relative}
  .tip .tip-text{visibility:hidden;opacity:0;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--card);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:8px 12px;font-size:.72rem;color:var(--text-dim);white-space:nowrap;z-index:10;transition:opacity .2s;pointer-events:none}
  .tip:hover .tip-text{visibility:visible;opacity:1}
  /* clickable card with expand */
  .expand-card{cursor:pointer}
  .expand-card .detail{max-height:0;overflow:hidden;transition:max-height .4s ease,opacity .3s;opacity:0}
  .expand-card.open .detail{max-height:200px;opacity:1}
  /* counter animation */
  .counter{display:inline-block}
  /* progress bar */
  #progress{position:fixed;bottom:0;left:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width .4s ease;z-index:100}
  /* nav */
  #nav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:14px;z-index:100;background:rgba(15,23,42,.85);backdrop-filter:blur(10px);padding:8px 18px;border-radius:30px;border:1px solid rgba(255,255,255,.1)}
  #nav button{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1.1rem;padding:4px 8px;border-radius:8px;transition:all .2s}
  #nav button:hover{color:var(--text);background:rgba(255,255,255,.1)}
  #page-num{font-size:.82rem;color:var(--text-muted);min-width:60px;text-align:center}
  /* TOC overlay */
  #toc{position:fixed;inset:0;background:rgba(15,23,42,.95);backdrop-filter:blur(20px);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px}
  #toc.show{display:flex}
  #toc .toc-item{padding:10px 24px;border-radius:8px;cursor:pointer;font-size:.95rem;color:var(--text-dim);transition:all .2s;width:460px;text-align:left}
  #toc .toc-item:hover{background:var(--surface);color:var(--text);transform:translateX(8px)}
  #toc .toc-item.active{color:var(--primary-light);font-weight:600}
  #toc .toc-title{font-size:1.4rem;font-weight:700;margin-bottom:16px;color:var(--text)}
  /* arch layer */
  .arch-layer{background:var(--surface);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);padding:14px 20px;margin-bottom:10px;display:flex;align-items:center;gap:14px;width:100%;max-width:1000px;transition:all .3s}
  .arch-layer:hover{border-color:rgba(59,130,246,.3);transform:translateX(4px)}
  .arch-layer .layer-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;min-width:70px;padding:4px 10px;border-radius:6px;text-align:center}
  .arch-layer .layer-items{display:flex;gap:8px;flex-wrap:wrap}
  .arch-layer .layer-item{background:var(--card);padding:5px 12px;border-radius:8px;font-size:.75rem;color:var(--text-dim);border:1px solid rgba(255,255,255,.05);transition:all .2s}
  .arch-layer .layer-item:hover{border-color:rgba(59,130,246,.3);color:var(--text)}
  /* model route */
  .route-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;width:100%;max-width:900px}
  .route-task{min-width:90px;font-size:.78rem;font-weight:600;text-align:right;color:var(--text-dim)}
  .route-model{background:var(--surface);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 14px;font-size:.78rem;flex:1;transition:all .3s;cursor:default}
  .route-model:hover{border-color:var(--primary)}
  .route-model.primary{border-color:rgba(59,130,246,.4);background:rgba(59,130,246,.08)}
  .route-model.fallback{border-color:rgba(255,255,255,.06);opacity:.6}
  .route-badge{font-size:.6rem;padding:2px 7px;border-radius:10px;margin-left:6px}
  .route-badge-p{background:rgba(59,130,246,.2);color:var(--primary-light)}
  .route-badge-f{background:rgba(255,255,255,.08);color:var(--text-muted)}
  /* cycle */
  .cycle{position:relative;width:320px;height:320px}
  .cycle-node{position:absolute;width:110px;text-align:center;transition:transform .3s;cursor:default}
  .cycle-node:hover{transform:scale(1.15)}
  .cycle-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;text-align:center;box-shadow:0 0 40px rgba(59,130,246,.3)}
  .cycle-node .c-label{font-size:.72rem;font-weight:600}
  .cycle-node .c-desc{font-size:.58rem;color:var(--text-dim);margin-top:2px}
  /* ltc stage chip */
  .stage-chip{padding:8px 14px;border-radius:10px;text-align:center;min-width:72px;transition:all .3s;cursor:default}
  .stage-chip:hover{transform:scale(1.1);box-shadow:0 0 20px rgba(59,130,246,.3)}
  .stage-chip .s-label{font-size:.7rem;font-weight:600;margin-top:2px}
  .stage-chip .s-desc{font-size:.55rem;opacity:.7;margin-top:1px}
  /* hint */
  .click-hint{position:fixed;top:20px;right:20px;font-size:.72rem;color:var(--text-muted);z-index:50;opacity:.5}
  /* pulse */
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .pulse{animation:pulse 2s infinite}
  /* glow ring for flow end */
  @keyframes glow{0%,100%{box-shadow:0 0 15px rgba(34,197,94,.2)}50%{box-shadow:0 0 30px rgba(34,197,94,.5)}}
  .glow{animation:glow 2.5s infinite}
</style>
</head>
<body>

<div id="nav">
  <button onclick="prev()" title="上一页">&larr;</button>
  <span id="page-num">1 / 12</span>
  <button onclick="next()" title="下一页">&rarr;</button>
  <button onclick="toggleToc()" title="目录">&#9776;</button>
</div>
<div id="progress"></div>
<div id="toc">
  <div class="toc-title">目录</div>
</div>
<div id="app"></div>
<div class="click-hint">&larr; &rarr; 翻页 &middot; ESC 目录 &middot; 点击卡片展开详情</div>

<script>
const slides = [];

function addSlide(html) { slides.push(html); }

// ─── Slide 1: Cover ─────────────────────────────
addSlide(`
  <div style="text-align:center">
    <div style="width:80px;height:4px;background:linear-gradient(90deg,#60a5fa,#a78bfa,#22d3ee);border-radius:2px;margin:0 auto 28px"></div>

      知识库

// ─── Slide 2: Pain Points ───────────────────────
addSlide(`

      </div>
    </div>
    <div class="card expand-card" onclick="this.classList.toggle('open')">
      <div class="icon-box" style="background:rgba(245,158,11,.15);color:#fbbf24">2</div>
      <h3 style="color:#fbbf24">转化低效</h3>
      <p style="font-size:.85rem;color:var(--text-dim);margin-top:8px;line-height:1.6">

      </p>
      <div class="detail" style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06)">
        <p style="font-size:.75rem;color:var(--text-dim);line-height:1.5">人工阅读 100 页方案文档 → 提取关键信息 → 至少 2-3 个工作日</p>
      </div>
    </div>
    <div class="card expand-card" onclick="this.classList.toggle('open')">
      <div class="icon-box" style="background:rgba(139,92,246,.15);color:#a78bfa">3</div>
      <h3 style="color:#a78bfa">复用困难</h3>
      <p style="font-size:.85rem;color:var(--text-dim);margin-top:8px;line-height:1.6">

      </p>
      <div class="detail" style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06)">
        <p style="font-size:.75rem;color:var(--text-dim);line-height:1.5">同样的回款流程写了 10 遍，每个项目各写各的，口径不统一</p>
      </div>
    </div>
  </div>
  <p style="margin-top:20px;font-size:.72rem;color:var(--text-muted)">点击卡片展开详情</p>
`);

// ─── Slide 3: System Overview ───────────────────
addSlide(`
  <h2>系统总览</h2>
  <div style="margin-top:20px;width:100%;max-width:900px">
    <div class="arch-layer">
      <div class="layer-label" style="background:rgba(59,130,246,.15);color:var(--primary-light)">前端</div>

// ─── Slide 4: Core Pipeline ─────────────────────
addSlide(`

// ─── Slide 5: Smart Slicing ─────────────────────
addSlide(`
  <h2>智能切片 &mdash; 知识模块级精准分割</h2>
  <p class="subtitle" style="margin-bottom:16px">不是暴力截断，而是按语义边界智能拆分</p>

      <h3>语义边界切割</h3>
      <p style="font-size:.82rem;color:var(--text-dim);line-height:1.6;margin-top:8px">

const app = document.getElementById('app');
const progress = document.getElementById('progress');
const pageNum = document.getElementById('page-num');
const tocEl = document.getElementById('toc');
let current = 0;
let tocOpen = false;

function render() {
  app.innerHTML = '';
  slides.forEach((html, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === current ? ' active' : '');
    div.innerHTML = html;
    app.appendChild(div);
  });
  progress.style.width = ((current + 1) / slides.length * 100) + '%';
  pageNum.textContent = (current + 1) + ' / ' + slides.length;
  // rebuild TOC
  const tocTitle = tocEl.querySelector('.toc-title');
  tocEl.innerHTML = '';
  if (tocTitle) tocEl.appendChild(tocTitle);
  const titleEl = document.createElement('div');
  titleEl.className = 'toc-title';
  titleEl.textContent = '目录';
  tocEl.appendChild(titleEl);
  tocTitles.forEach((t, i) => {
    const item = document.createElement('div');
    item.className = 'toc-item' + (i === current ? ' active' : '');
    item.textContent = (i + 1) + '. ' + t;
    item.onclick = () => { goTo(i); toggleToc(); };
    tocEl.appendChild(item);
  });
}

function goTo(i) {
  if (i < 0 || i >= slides.length) return;
  current = i;
  render();
}
function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }
function toggleToc() {
  tocOpen = !tocOpen;
  tocEl.classList.toggle('show', tocOpen);
}

// keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
  else if (e.key === 'Escape') { toggleToc(); }
});

// click left/right edge
document.addEventListener('click', e => {
  if (tocOpen) return;
  // don't navigate if clicking a card
  if (e.target.closest('.expand-card') || e.target.closest('.tip')) return;
  const x = e.clientX / window.innerWidth;
  if (x < 0.2) prev();
  else if (x > 0.8) next();
});

// touch swipe
let touchX = 0;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 60) { dx > 0 ? prev() : next(); }
});

render();
</script>
</body>
</html>
