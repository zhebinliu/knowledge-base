# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# edge/nginx.conf — edge 容器(全服务器唯一 80/443 入口)
#
# 2026-07-14 从 frontend/nginx.prod.conf 拆出:边缘代理与 kb 业务前端解耦,
# kb 前/后端日常部署只重建自己的内网容器,aihub/skillhub/kanban/studio/uat 无感。
#
# 角色:
#   1. 持有全部域名的 Let's Encrypt 证书,终止 TLS
#   2. 按 server_name 分流到各内网容器(全部 plain HTTP):
#      kb.liii.in / kb.tokenwave.cloud → frontend:80(kb 正式版 dist)
#      uat.tokenwave.cloud             → 302 到 kb.liii.in(预览已下线 2026-07-14)
#      skillhub.tokenwave.cloud        → skillhub-frontend:80 + skillhub-backend:8001
#      aihub.tokenwave.cloud           → aihub-tap:8080(/v1)+ new-api:3000
#      kanban.tokenwave.cloud          → plane-proxy:80(独立 compose /opt/kanban)
#      studio.tokenwave.cloud          → pmds-studio:8080(独立 compose pmds)
#   3. ACME webroot(/var/www/certbot)+ HTTP→HTTPS 301
#
# 铁律:所有内网 upstream 一律 `set $var xxx; proxy_pass http://$var:port;`
# + 顶部全局 resolver 延迟解析 —— 目标容器重建换 IP 自愈(≤10s),容器缺失
# 只 502 自己的域名、不挡 edge 启动。静态 proxy_pass 写法禁止再出现
# (历史两次事故:backend 重建 /api 全 502;skillhub 容器没起 nginx 起不来)。
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# docker 内置 DNS,按请求(10s 缓存)解析容器名
resolver 127.0.0.11 valid=10s ipv6=off;

# HTTP — serve ACME challenges, redirect everything else to HTTPS
server {
    listen 80 default_server;
    server_name _;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # docker healthcheck 走 http://127.0.0.1/health — 不能跟着 301 到 HTTPS
    location = /health { access_log off; return 200 'ok'; default_type text/plain; }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — kb.liii.in(生产正式)→ frontend:80
server {
    listen 443 ssl;
    http2 on;
    server_name kb.liii.in;
    charset utf-8;
    client_max_body_size 100m;

    ssl_certificate     /etc/letsencrypt/live/kb.liii.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kb.liii.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com https://cdn.tailwindcss.com; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # edge 自答,不进内网容器
    location = /health { access_log off; return 200 'ok'; default_type text/plain; }

    # frontend 容器重建的几秒钟内(connect 失败产生的 502/504)兜维护页;
    # 容器自己返回的 503(.maintenance 标志)原样透传,不在这拦
    error_page 502 504 /maintenance.html;
    location = /maintenance.html {
        root /usr/share/nginx/edge;
        add_header Cache-Control "no-store" always;
        add_header Retry-After 15 always;
    }

    # 其余全部(SPA 静态 + /api)→ frontend 容器;/api 由它再代到 backend,
    # 维护标志 / 缓存策略 / SPA fallback 都在 frontend 容器内配置
    location / {
        set $kb_upstream      frontend;
        proxy_pass            http://$kb_upstream:80;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_read_timeout    180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_buffering       off;
        proxy_request_buffering off;
    }
}

